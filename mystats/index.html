<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>MyStats - 汎用統計トラッカー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>

  :root{
    --paper:#F5F7F3;
    --grid:#E4EAE2;
    --card:#FFFFFF;
    --ink:#22302E;
    --ink-soft:#5C6B67;
    --line:#DCE3DB;
    --danger:#B3402E;
    --star-off:#D7DDD5;
    --star-on:#E8A93C;
    --note-bg:#FFF9E8; --note-line:#EFE2B4;
    --note2-bg:#EEF4EE; --note2-line:#D3E0D3;
    --radius:14px;
    --shadow:0 1px 2px rgba(34,48,46,.06), 0 4px 14px rgba(34,48,46,.05);
  }
  /* ダークモード(prefers-color-scheme) — モックの紙+インクの雰囲気を暗色に置換 */
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --paper:#1E2523;
      --grid:#242C29;
      --card:#273130;
      --ink:#E9EDEA;
      --ink-soft:#9AA8A3;
      --line:#39443F;
      --danger:#E07B63;
      --star-off:#4A5450;
      --note-bg:#39331F; --note-line:#5C5330;
      --note2-bg:#273328; --note2-line:#3B4E3D;
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
    }
  }
  :root[data-theme="dark"]{
      --paper:#1E2523;
      --grid:#242C29;
      --card:#273130;
      --ink:#E9EDEA;
      --ink-soft:#9AA8A3;
      --line:#39443F;
      --danger:#E07B63;
      --star-off:#4A5450;
      --note-bg:#39331F; --note-line:#5C5330;
      --note2-bg:#273328; --note2-line:#3B4E3D;
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic UI",system-ui,sans-serif;
    color:var(--ink);
    background:
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0/100% 28px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0/28px 100%,
      var(--paper);
    font-size:15px; line-height:1.6;
  }
  button{font-family:inherit;}
  #frame{max-width:460px; margin:0 auto; min-height:100dvh; position:relative; padding-bottom:96px;}

  /* ── header ── */
  header{
    padding:18px 20px 10px;
    display:flex; align-items:baseline; justify-content:space-between;
  }
  header h1{font-size:20px; letter-spacing:.06em; font-weight:800; cursor:pointer;}
  header h1 small{font-size:11px; font-weight:600; color:var(--ink-soft); letter-spacing:.14em; margin-left:6px;}
  .iconbtn{border:none; background:none; font-size:20px; cursor:pointer; color:var(--ink); padding:4px;}
  /* ruler tick strip — signature */
  .ruler{height:10px; margin:0 20px 14px;
    background:repeating-linear-gradient(90deg, var(--ink) 0 1px, transparent 1px 10px);
    -webkit-mask:linear-gradient(#000 55%, transparent 55%);
    mask:linear-gradient(#000 55%, transparent 55%);
    opacity:.35;
  }

  main{padding:0 16px;}

  /* ── note / banner ── */
  .banner{
    font-size:11.5px; color:var(--ink-soft); background:var(--note-bg); border:1px solid var(--note-line);
    border-radius:8px; padding:7px 10px; margin:0 4px 14px;
    display:flex; gap:8px; align-items:center;
  }
  .banner .b-main{flex:1;}
  .banner.error{background:color-mix(in srgb, var(--danger) 12%, var(--paper)); border-color:var(--danger); color:var(--danger);}
  .banner .btn.small{flex:none; padding:6px 12px; font-size:12px;}
  .note2{
    font-size:11.5px; color:var(--ink-soft); background:var(--note2-bg); border:1px solid var(--note2-line);
    border-radius:8px; padding:7px 10px; margin-top:8px;
  }

  /* ── streak ── */
  .streak{display:flex; align-items:baseline; gap:8px; padding:2px 4px 14px;}
  .streak .num{font:800 34px/1 ui-monospace,"SF Mono",Menlo,monospace; font-variant-numeric:tabular-nums;}
  .streak .lbl{font-size:12px; color:var(--ink-soft); letter-spacing:.08em;}

  /* ── genre cards ── */
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:14px 16px; margin-bottom:12px; cursor:pointer;
    border-left:4px solid var(--gcolor,var(--ink)); position:relative;
    transition:transform .12s ease;
  }
  .card:active{transform:scale(.985);}
  .card .top{display:flex; justify-content:space-between; align-items:center;}
  .card .name{font-weight:700; font-size:15px;}
  .card .name .em{margin-right:6px;}
  .card .cnt{font-size:11px; color:var(--ink-soft);}
  .card .stat{display:flex; align-items:flex-end; justify-content:space-between; margin-top:6px;}
  .card .val{font:800 30px/1.1 ui-monospace,"SF Mono",Menlo,monospace; font-variant-numeric:tabular-nums;}
  .card .val small{font:600 12px/1 "Hiragino Sans",sans-serif; color:var(--ink-soft); margin-left:4px;}
  .card .sub{font-size:11px; color:var(--ink-soft); letter-spacing:.06em;}
  .card svg{display:block;}

  .addgenre{
    width:100%; border:1.5px dashed var(--line); background:transparent; color:var(--ink-soft);
    border-radius:var(--radius); padding:13px; font-size:14px; cursor:pointer; margin-top:2px;
  }

  /* ── FAB ── */
  .fab{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--paper); border:none; border-radius:999px;
    padding:15px 30px; font-size:15px; font-weight:700; letter-spacing:.1em;
    box-shadow:0 8px 22px rgba(34,48,46,.32); cursor:pointer; z-index:40;
  }
  .fab:active{transform:translateX(-50%) scale(.96);}

  /* ── sub pages ── */
  .pagehead{display:flex; align-items:center; gap:8px; padding:14px 4px 10px;}
  .back{border:none;background:none;font-size:20px;cursor:pointer;color:var(--ink);padding:4px 8px 4px 0;}
  .pagehead h2{font-size:17px; font-weight:800;}
  .pagehead .spacer{flex:1;}

  .tabs{display:flex; gap:6px; margin:4px 4px 14px;}
  .tabs button{
    flex:1; padding:8px; border-radius:999px; border:1px solid var(--line);
    background:var(--card); font-size:13px; font-weight:600; color:var(--ink-soft); cursor:pointer;
  }
  .tabs button.on{background:var(--ink); color:var(--paper); border-color:var(--ink);}

  .chips{display:flex; gap:6px; margin:0 4px 14px; overflow-x:auto;}
  .chips button{
    padding:6px 13px; border-radius:999px; border:1px solid var(--line); background:var(--card);
    font-size:12px; color:var(--ink-soft); cursor:pointer; white-space:nowrap;
  }
  .chips button.on{border-color:var(--gcolor,var(--ink)); color:var(--gcolor,var(--ink)); font-weight:700;}
  .rangerow{display:flex; gap:8px; align-items:center; margin:0 4px 14px;}
  .rangerow input{flex:1; min-width:0; padding:9px 10px; border:1px solid var(--line); border-radius:10px; background:var(--card); color:var(--ink); font-size:14px; font-family:inherit;}
  .rangerow .tilde{color:var(--ink-soft);}
  .rangerow .btn{flex:none; padding:9px 16px; font-size:13px;}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px;}
  .statbox{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; box-shadow:var(--shadow);}
  .statbox .k{font-size:11px; color:var(--ink-soft); letter-spacing:.1em;}
  .statbox .v{font:800 24px/1.2 ui-monospace,"SF Mono",Menlo,monospace; font-variant-numeric:tabular-nums;}
  .statbox .v small{font:600 11px/1 "Hiragino Sans",sans-serif; color:var(--ink-soft);}

  .chartbox{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px; margin-bottom:12px;}
  .chartbox h3{font-size:12px; color:var(--ink-soft); letter-spacing:.1em; margin-bottom:8px; font-weight:700;}
  .chartctl{display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; align-items:center;}
  .chartctl select{
    flex:1; min-width:110px; padding:6px 10px; border:1px solid var(--line); border-radius:999px;
    background:var(--card); color:var(--ink-soft); font-size:12px; font-family:inherit;
  }
  .chartctl .gr{display:flex; gap:4px;}
  .chartctl .gr button{
    padding:6px 12px; border-radius:999px; border:1px solid var(--line); background:var(--card);
    font-size:12px; color:var(--ink-soft); cursor:pointer;
  }
  .chartctl .gr button.on{background:var(--ink); color:var(--paper); border-color:var(--ink);}
  .chart-wrap{position:relative; height:220px;}
  .chart-wrap.donut{height:200px;}

  /* records list */
  .rec{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:11px 14px; margin-bottom:8px; display:flex; gap:12px; align-items:center; box-shadow:var(--shadow);
    cursor:pointer;
  }
  .rec .d{font:700 12px/1.3 ui-monospace,Menlo,monospace; color:var(--ink-soft); min-width:52px; text-align:center;}
  .rec .d b{display:block; font-size:16px; color:var(--ink);}
  .rec .body{flex:1; font-size:13px; min-width:0;}
  .rec .body .main{font-weight:700; font-size:14px;}
  .rec .body .meta{color:var(--ink-soft); font-size:12px;}
  .rec .del{border:none;background:none;color:var(--ink-soft);font-size:15px;cursor:pointer;padding:6px;}

  .empty{padding:40px 10px; text-align:center; color:var(--ink-soft); font-size:13px;}
  .empty .big{font-size:40px; margin-bottom:10px;}

  /* ── modal(sheet) ── */
  .overlay{
    position:fixed; inset:0; background:rgba(34,48,46,.4); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .sheet{
    background:var(--paper); width:100%; max-width:460px; border-radius:20px 20px 0 0;
    padding:18px 20px calc(20px + env(safe-area-inset-bottom)); max-height:88dvh; overflow-y:auto;
  }
  .sheet h3{font-size:16px; font-weight:800; margin-bottom:14px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:5px; letter-spacing:.05em;}
  .field label .req{color:var(--danger); margin-left:3px;}
  .field input[type=text],.field input[type=number],.field input[type=date],.field select,.field textarea{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:10px;
    font-size:16px; background:var(--card); color:var(--ink); font-family:inherit;
  }
  .field textarea{resize:vertical;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none; border-color:var(--ink-soft);}
  .field-error{border-color:var(--danger)!important;}
  .hint{font-size:12px; color:var(--ink-soft); margin-top:4px; line-height:1.7;}
  .error-msg{color:var(--danger); font-size:12px; margin-top:3px;}
  .field .withunit{display:flex; align-items:center; gap:8px;}
  .field .withunit input{flex:1;}
  .field .unit{font-size:13px; color:var(--ink-soft); min-width:2em;}
  .stars{display:flex; gap:6px; font-size:26px; cursor:pointer; user-select:none;}
  .stars span{color:var(--star-off);}
  .stars span.on{color:var(--star-on);}
  .stars .clearstar{font-size:12px; color:var(--ink-soft); align-self:center; margin-left:6px; text-decoration:underline;}
  .toggle{width:52px; height:30px; border-radius:999px; background:var(--star-off); border:none; position:relative; cursor:pointer; transition:background .15s; flex:none;}
  .toggle::after{content:""; position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff; transition:left .15s;}
  .toggle.on{background:var(--gcolor,var(--ink));}
  .toggle.on::after{left:25px;}
  .gpick{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
  .gpick button{
    padding:9px 14px; border-radius:999px; border:1.5px solid var(--line); background:var(--card);
    font-size:13px; cursor:pointer; font-weight:600; color:var(--ink);
  }
  .gpick button.on{border-color:var(--gcolor,var(--ink)); color:var(--gcolor,var(--ink));}
  .btnrow{display:flex; gap:10px; margin-top:18px;}
  .btn{flex:1; padding:13px; border-radius:12px; border:none; font-size:15px; font-weight:700; cursor:pointer;}
  .btn.primary{background:var(--ink); color:var(--paper);}
  .btn.primary:disabled{opacity:.35; cursor:default;}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--ink-soft);}
  .btn.danger{background:var(--danger); color:#fff;}
  .btn.danger:disabled{opacity:.35; cursor:default;}

  /* genre edit */
  .frow{
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:10px 12px; margin-bottom:8px; display:flex; align-items:center; gap:6px 10px; font-size:13px;
    flex-wrap:wrap;
  }
  .frow .fn{flex:1; font-weight:700; min-width:72px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .frow .rowbtn{border:none;background:none;color:var(--ink-soft);font-size:14px;cursor:pointer;padding:4px 5px;}
  .frow{user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;}
  .draghandle{cursor:grab; touch-action:none; color:var(--ink-soft); font-size:15px; padding:4px 8px 4px 2px; letter-spacing:-2px; flex:none;}
  .drag-src{opacity:.3;}
  .frow-ghost{
    position:fixed; z-index:120; pointer-events:none; margin:0;
    box-shadow:0 14px 34px rgba(34,48,46,.32); transform:scale(1.03); opacity:.97;
    background:var(--card); border-radius:10px;
  }
  .frow-ghost .swipe-del{display:none;}
  .frow .rowbtn:disabled{opacity:.25; cursor:default;}
  .badge{font-size:10.5px; padding:2px 8px; border-radius:999px; background:var(--paper); border:1px solid var(--line); color:var(--ink-soft); white-space:nowrap;}
  .sethead{font-size:12px; font-weight:700; color:var(--ink-soft); letter-spacing:.1em; margin:18px 4px 8px;}
  .setrow{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:13px 15px; margin-bottom:8px; font-size:14px; cursor:pointer; box-shadow:var(--shadow); display:flex; justify-content:space-between; align-items:center;}
  .setrow.warn{color:var(--danger);}
  .setrow .arr{color:var(--ink-soft);}
  .setrow span:first-child{flex:1;}
  .setrow .valtxt{color:var(--ink-soft); font-size:13px; margin-right:8px;}

  /* emoji / color pickers (S-4) */
  .emoji-row{display:flex; flex-wrap:wrap; gap:6px;}
  .emoji-row button{width:40px; height:40px; font-size:20px; border:1px solid var(--line); border-radius:10px; background:var(--card); cursor:pointer;}
  .emoji-row button.on{border-color:var(--ink); border-width:2px;}
  .colorrow{display:flex; flex-wrap:wrap; gap:8px;}
  .colorrow button{width:30px; height:30px; border-radius:50%; border:3px solid transparent; cursor:pointer;}
  .colorrow button.on{border-color:var(--ink);}

  /* ── チュートリアル(初回起動・横スライド) ── */
  .tut-overlay{position:fixed; inset:0; background:var(--paper); z-index:80; display:flex; flex-direction:column;}
  .tut-slides{flex:1; display:flex; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
  .tut-slides::-webkit-scrollbar{display:none;}
  .tslide{min-width:100%; scroll-snap-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px 36px;}
  .tslide .art{font-size:96px; line-height:1; margin-bottom:30px;}
  .tslide h2{font-size:23px; font-weight:800; margin-bottom:14px;}
  .tslide p{font-size:15px; color:var(--ink-soft); max-width:300px; line-height:1.9;}
  .tut-dots{display:flex; gap:8px; justify-content:center; padding:12px;}
  .tut-dots span{width:8px; height:8px; border-radius:999px; background:var(--line); transition:all .2s;}
  .tut-dots span.on{background:var(--ink); width:24px;}
  .tut-foot{padding:0 24px calc(24px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:6px;}
  #tut-skip{background:none; border:none; color:var(--ink-soft); font-size:13px; text-decoration:underline; cursor:pointer; padding:10px;}

  /* ── ロック画面(パスコード & Face ID) ── */
  .lock-overlay{position:fixed; inset:0; background:var(--paper); z-index:90; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:24px;}
  .lock-overlay .lockicon{font-size:44px;}
  .lock-overlay h2{font-size:20px; font-weight:800; letter-spacing:.06em;}
  .pin-dots{display:flex; gap:16px; padding:6px 0;}
  .pin-dots span{width:14px; height:14px; border-radius:50%; border:1.5px solid var(--ink-soft);}
  .pin-dots span.on{background:var(--ink); border-color:var(--ink);}
  .lock-msg{font-size:12px; color:var(--danger); min-height:18px;}
  .pin-pad{display:grid; grid-template-columns:repeat(3,72px); gap:14px;}
  .pin-pad button{height:72px; border-radius:50%; border:1px solid var(--line); background:var(--card); font-size:24px; font-weight:700; color:var(--ink); cursor:pointer; box-shadow:var(--shadow);}
  .pin-pad button:active{background:var(--line);}
  .pin-pad .ghostkey{border:none; background:none; box-shadow:none; font-size:17px;}
  .lock-bio{background:none; border:none; color:var(--ink-soft); font-size:14px; text-decoration:underline; cursor:pointer; padding:6px;}
  @keyframes shake{0%,100%{transform:none}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
  .shake{animation:shake .25s;}

  /* ── ドロワーメニュー(☰) ── */
  .drawer-ov{position:fixed; inset:0; background:rgba(34,48,46,.4); z-index:70; opacity:0; transition:opacity .25s;}
  .drawer-ov.show{opacity:1;}
  .drawer{
    position:fixed; top:0; left:0; bottom:0; width:290px; max-width:82vw;
    background:var(--paper); z-index:71; overflow-y:auto;
    transform:translateX(-105%); transition:transform .28s cubic-bezier(.22,.9,.3,1);
    box-shadow:8px 0 30px rgba(34,48,46,.25);
    padding:22px 14px calc(20px + env(safe-area-inset-bottom));
  }
  .drawer.show{transform:none;}
  .drawer .dtitle{font-size:19px; font-weight:800; letter-spacing:.06em; margin:0 8px;}
  .drawer .dtitle small{font-size:10px; font-weight:600; color:var(--ink-soft); letter-spacing:.14em; margin-left:6px;}
  .drawer .druler{height:10px; margin:10px 8px 12px;
    background:repeating-linear-gradient(90deg, var(--ink) 0 1px, transparent 1px 10px);
    -webkit-mask:linear-gradient(#000 55%, transparent 55%);
    mask:linear-gradient(#000 55%, transparent 55%); opacity:.35;}
  .drow{display:flex; align-items:center; gap:14px; padding:13px 10px; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; color:var(--ink);}
  .drow:active{background:var(--card);}
  .drow .ic{width:26px; text-align:center; font-size:18px; flex:none;}
  .drow.sub{font-size:14px; padding:10px 10px 10px 16px;}
  .dsep{height:1px; background:var(--line); margin:10px 6px;}
  .dhead{font-size:11px; font-weight:700; color:var(--ink-soft); letter-spacing:.1em; margin:12px 12px 2px;}

  /* ── ⋮ドロップダウンメニュー ── */
  .pagehead{position:relative; z-index:5;} /* fadeupアニメの積層コンテキストより上に⋮メニューを出す */
  .kmenu{
    position:absolute; top:46px; right:0; background:var(--card); border:1px solid var(--line);
    border-radius:14px; box-shadow:0 12px 34px rgba(34,48,46,.22); z-index:60; min-width:210px; overflow:hidden;
    transform-origin:top right; animation:kpop .16s ease-out;
  }
  @keyframes kpop{from{opacity:0; transform:scale(.9)}to{opacity:1; transform:none}}
  .kmenu button{display:flex; width:100%; text-align:left; gap:12px; align-items:center; padding:14px 16px; border:none; background:none; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer;}
  .kmenu button:active{background:var(--paper);}
  .kmenu button + button{border-top:1px solid var(--line);}
  .kmenu button.warn{color:var(--danger);}

  /* ── コーチマーク(スポットライト機能ツアー) ── */
  .coach{position:fixed; inset:0; z-index:85;}
  .coach-hole{
    position:absolute; border-radius:18px;
    box-shadow:0 0 0 4000px color-mix(in srgb, var(--ink) 62%, transparent);
    transition:all .45s cubic-bezier(.3,.85,.3,1);
  }
  .coach-hole::after{content:""; position:absolute; inset:-6px; border:2px solid var(--paper); border-radius:inherit; animation:coachpulse 1.6s ease-out infinite;}
  @keyframes coachpulse{0%{transform:scale(1); opacity:.95}70%{transform:scale(1.13); opacity:0}100%{opacity:0}}
  .coach-tip{
    position:absolute; left:16px; right:16px;
    background:var(--paper); color:var(--ink);
    border-radius:16px; padding:16px 18px;
    font-size:17px; font-weight:700; line-height:1.85;
    box-shadow:0 14px 44px rgba(0,0,0,.4);
    transition:top .45s cubic-bezier(.3,.85,.3,1);
  }

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10));

const fmtNum = n => (typeof n === 'number' && isFinite(n)) ? (Math.round(n * 10) / 10).toLocaleString('ja-JP') : '-';
const DOW = ['日','月','火','水','木','金','土'];
function fmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayStr(){ return fmtDate(new Date()); }
function dateLabel(s){ // "YYYY-MM-DD" -> "M/D(曜)"
  const d = new Date(s + 'T00:00:00');

/* ---------- IndexedDB ラッパー ---------- */
const DB_NAME = 'mystats';
const DB_VERSION = 1;
let memoryMode = false; // IndexedDB不可時(プライベートモード等)はメモリ動作

const db = {
  _db: null,
  _mem: null, // メモリモード用: { genres:Map, records:Map, meta:Map }

  init(){
    return new Promise((resolve) => {
      if (!window.indexedDB) { this._enableMemoryMode(); resolve(); return; }
      let req;
      try { req = indexedDB.open(DB_NAME, DB_VERSION); }
      catch(e){ this._enableMemoryMode(); resolve(); return; }
      req.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('genres')) {
          const g = d.createObjectStore('genres', { keyPath: 'id' });
          g.createIndex('order', 'order');
        }
        if (!d.objectStoreNames.contains('records')) {
          const r = d.createObjectStore('records', { keyPath: 'id' });
          r.createIndex('genreId', 'genreId');
          r.createIndex('date', 'date');
          r.createIndex('genreId_date', ['genreId', 'date']);
        }
        if (!d.objectStoreNames.contains('meta')) {
          d.createObjectStore('meta', { keyPath: 'key' });
        }
      };
      req.onsuccess = (e) => { this._db = e.target.result; resolve(); };
      req.onerror = () => { this._enableMemoryMode(); resolve(); };
      req.onblocked = () => { this._enableMemoryMode(); resolve(); };
    });
  },

  _enableMemoryMode(){
    memoryMode = true;
    this._mem = { genres: new Map(), records: new Map(), meta: new Map() };
  },

  _tx(store, mode){
    return this._db.transaction(store, mode).objectStore(store);
  },
  _wrap(req){
    return new Promise((res, rej) => {
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  },
  _keyOf(store){ return store === 'meta' ? 'key' : 'id'; },

  async getAll(store){
    if (memoryMode) return [...this._mem[store].values()];
    return this._wrap(this._tx(store, 'readonly').getAll());
  },
  async get(store, key){
    if (memoryMode) return this._mem[store].get(key);
    return this._wrap(this._tx(store, 'readonly').get(key));
  },
  async put(store, obj){
    if (memoryMode) { this._mem[store].set(obj[this._keyOf(store)], obj); return obj; }
    await this._wrap(this._tx(store, 'readwrite').put(obj));
    return obj;
  },
  async bulkPut(store, objs){
    if (memoryMode) { for (const o of objs) this._mem[store].set(o[this._keyOf(store)], o); return; }
    return new Promise((res, rej) => {
      const tx = this._db.transaction(store, 'readwrite');
      const os = tx.objectStore(store);
      for (const o of objs) os.put(o);
      tx.oncomplete = () => res();
      tx.onerror = () => rej(tx.error);
    });
  },
  async delete(store, key){
    if (memoryMode) { this._mem[store].delete(key); return; }
    await this._wrap(this._tx(store, 'readwrite').delete(key));
  },
  async bulkDelete(store, keys){
    if (memoryMode) { for (const k of keys) this._mem[store].delete(k); return; }
    return new Promise((res, rej) => {
      const tx = this._db.transaction(store, 'readwrite');
      const os = tx.objectStore(store);
      for (const k of keys) os.delete(k);
      tx.oncomplete = () => res();
      tx.onerror = () => rej(tx.error);
    });
  },
  async clear(store){
    if (memoryMode) { this._mem[store].clear(); return; }
    await this._wrap(this._tx(store, 'readwrite').clear());
  },
  // 複合インデックス [genreId+date] を使った範囲取得(genreId単位)
  async getRecordsByGenre(genreId){
    if (memoryMode) return [...this._mem.records.values()].filter(r => r.genreId === genreId);
    const idx = this._tx('records', 'readonly').index('genreId_date');
    const range = IDBKeyRange.bound([genreId, ''], [genreId, '￿']);
    return this._wrap(idx.getAll(range));
  },
  async countRecordsByGenre(genreId){
    if (memoryMode) return (await this.getRecordsByGenre(genreId)).length;
    const idx = this._tx('records', 'readonly').index('genreId');
    return this._wrap(idx.count(genreId));
  },
  async getMeta(key){
    const row = await this.get('meta', key);
    return row ? row.value : undefined;
  },
  async setMeta(key, value){
    await this.put('meta', { key, value });
  }
};

/* 基本項目は固定仕様: 既存データの基本項目をテンプレート定義に復元する(初回のみ) */
async function migratePresetLock(){
  if (await db.getMeta('presetLockMigrated')) return;
  const genres = await db.getAll('genres');
  for (const g of genres) {
    const presets = (g.fields || []).filter(f => f.preset).sort((a, b) => a.order - b.order);
    if (!presets.length) continue;
    // 型の並びが一致するテンプレートを特定(並べ替え等で崩れている場合は触らない)
    const tpl = TEMPLATES.find(t =>
      t.fields.length === presets.length &&
      t.fields.every((tf, i) => tf.type === presets[i].type));
    if (!tpl) continue;
    // 単位の入れ替わりが疑われる場合(同型の別位置の単位と一致)は安全のためスキップ
    const swapRisk = presets.some((f, i) =>
      (f.unit || '') !== (tpl.fields[i].unit || '') &&
      tpl.fields.some((tf2, j) => j !== i && tf2.type === f.type && (tf2.unit || '') === (f.unit || '')));
    if (swapRisk) continue;
    let changed = false;
    tpl.fields.forEach((tf, i) => {
      const f = presets[i];
      if (f.name !== tf.name || (f.unit || '') !== (tf.unit || '') || !!f.required !== !!tf.required) changed = true;
      f.name = tf.name;
      f.unit = tf.unit || '';
      f.options = tf.options ? [...tf.options] : undefined;
      f.required = !!tf.required;
    });
    if (changed) {
      g.updatedAt = new Date().toISOString();
      await db.put('genres', g);
    }
  }
  await db.setMeta('presetLockMigrated', true);
}

/* テンプレートの fields を実体(コピー+id付与+preset:true)に変換 */
function instantiateTemplateFields(tpl){
  return tpl.fields.map((f, i) => ({
    id: uid(),
    name: f.name,
    type: f.type,
    unit: f.unit || '',
    options: f.options ? [...f.options] : undefined,
    required: !!f.required,
    preset: true,
    order: i,
  }));
}

/* ---------- モーダル ---------- */
function openModal(html){
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `<div class="sheet">${html}</div>`;
  document.body.appendChild(ov);
  let closed = false;
  const closeFns = [];
  const onKey = e => { if (e.key === 'Escape') api.close(); };
  const api = {
    el: ov,
    close(){
      if (closed) return;
      closed = true;
      ov.remove();
      document.removeEventListener('keydown', onKey);
      closeFns.forEach(f => f());
    },
    onClose(f){ closeFns.push(f); },
  };
  document.addEventListener('keydown', onKey);
  ov.addEventListener('click', e => { if (e.target === ov) api.close(); });
  return api;
}

/* ジャンルカード: 代表項目(先頭の数値項目)の今月合計 + 30日スパークライン */
async function genreCardEl(g){
  const records = await db.getRecordsByGenre(g.id);
  const monthStart = todayStr().slice(0, 7) + '-01';
  const monthRecords = records.filter(r => r.date >= monthStart);
  // ホームに表示する項目: ジャンル設定で明示選択(未設定なら一番上の数値項目、'__count__'なら記録数)
  const f = repNumberField(g);
  const total = f
    ? monthRecords.reduce((s, r) => s + (Number(r.values?.[f.id]) || 0), 0)
    : monthRecords.length;
  // 累計マイルストーン(全期間)
  const cum = cumulativeValue(g, records);
  const msNext = nextMilestone(cum.value);
  const msPrev = prevMilestone(cum.value);
  const msPct = Math.max(2, Math.min(100, Math.round((cum.value - msPrev) / (msNext - msPrev) * 100)));

  const el = document.createElement('div');
  el.className = 'card';
  el.style.setProperty('--gcolor', g.color);
  el.innerHTML = `
    <div class="top"><span class="name"><span class="em">${esc(g.icon)}</span>${esc(g.name)}</span><span class="cnt">全 ${fmtNum(records.length)} 件</span></div>
    <div class="stat">
      <div>
        <div class="val">${fmtNum(total)}<small>${esc(f ? (f.unit || '') : '件')}</small></div>
        <div class="sub">今月の${esc(f ? f.name : '記録数')}</div>
      </div>
      ${sparklineSVG(records, f, g.color)}
    </div>
    ${records.length === 0
      ? '<div class="sub" style="margin-top:6px">「＋ 記録」から1件つけると集計とグラフが始まります</div>'
      : `<div class="mstone">
           <div class="ms-bar"><i style="width:${msPct}%"></i></div>
           <div class="ms-txt">累計 <b>${fmtNum(cum.value)}</b>${esc(cum.unit)} ・ 次の節目 ${fmtNum(msNext)}${esc(cum.unit)} まで あと<b>${fmtNum(msNext - cum.value)}</b></div>
         </div>`}`;
  el.onclick = () => { location.hash = `#/genre/${g.id}`; };
  return el;
}

/* ホーム/累計の対象項目(明示選択 or 一番上の数値項目。nullなら記録数) */
function repNumberField(g){
  const numberFields = (g.fields || []).filter(x => x.type === 'number').sort((a, b) => a.order - b.order);
  if (g.repFieldId === '__count__') return null;
  return numberFields.find(x => x.id === g.repFieldId) || numberFields[0] || null;
}

/* 全期間の累計値(代表項目の合計 / なければ記録数) */
function cumulativeValue(g, records){
  const f = repNumberField(g);
  const value = f
    ? records.reduce((s, r) => s + (Number(r.values?.[f.id]) || 0), 0)
    : records.length;
  return { field: f, value, unit: f ? (f.unit || '') : '件', label: f ? f.name : '記録数' };
}

/* 節目のはしご: 10,25,50 × 10^k (10,25,50,100,250,500,1000,…) */
function nextMilestone(v){
  for (let base = 1; base <= 1e12; base *= 10) {
    for (const s of [10, 25, 50]) {
      const m = s * base;
      if (v < m) return m;
    }
  }
  return 1e13;
}
function prevMilestone(v){
  let prev = 0;
  for (let base = 1; base <= 1e12; base *= 10) {
    for (const s of [10, 25, 50]) {
      const m = s * base;
      if (m <= v) prev = m; else return prev;
    }
  }
  return prev;
}

/* 連続記録日数(今日または昨日を起点に遡る) */
function calcStreak(records){
  if (!records.length) return 0;
  const days = new Set(records.map(r => r.date));
  const d = new Date();
  if (!days.has(fmtDate(d))) d.setDate(d.getDate() - 1); // 今日未記録なら昨日から判定
  let streak = 0;
  while (days.has(fmtDate(d))) { streak++; d.setDate(d.getDate() - 1); }
  return streak;
}

/* 直近30日のスパークライン(SVG)。repFieldがあれば日次合計、なければ日次件数 */
function sparklineSVG(records, repField, color){
  const byDate = {};
  for (const r of records) {
    const v = repField ? (Number(r.values?.[repField.id]) || 0) : 1;
    byDate[r.date] = (byDate[r.date] || 0) + v;
  }
  const d = new Date();
  d.setDate(d.getDate() - 29);
  const vals = [];
  for (let i = 0; i < 30; i++) { vals.push(byDate[fmtDate(d)] || 0); d.setDate(d.getDate() + 1); }
  const mx = Math.max(...vals, 1);
  const pts = vals.map((v, i) => `${(i / 29 * 100).toFixed(1)},${(30 - v / mx * 26).toFixed(1)}`).join(' ');
  return `<svg class="gc-spark" width="100" height="32" viewBox="0 0 100 32" aria-hidden="true">
    <polyline points="${pts}" fill="none" stroke="${esc(color)}" stroke-width="2" stroke-linejoin="round"/>
  </svg>`;
}

  const txtF = fields.find(f => f.type === 'text' && r.values?.[f.id] !== undefined && r.values?.[f.id] !== '');

             : numF ? `${fmtNum(Number(r.values[numF.id]))} ${numF.unit || ''}`.trim()
             : '記録';
  const meta = fields.filter(f => f !== mainF).map(f => {

/* ---- 統計タブ ---- */
const PERIODS = [
  { key: 'thisWeek',  label: '今週' },
  { key: 'thisMonth', label: '今月' },
  { key: 'lastMonth', label: '先月' },
  { key: 'thisYear',  label: '今年' },
  { key: 'all',       label: '全期間' },
  { key: 'custom',    label: '任意期間' },
];
let statsPeriod = 'thisMonth';
let statsCustomFrom = '';       // 任意期間(F-4-4)
let statsCustomTo = '';
let statsChartFieldId = null;   // メイングラフの対象項目
let statsGranularity = null;    // 'day' | 'week' | 'month'(null=期間に応じて自動)
let chartInstances = [];

function destroyCharts(){
  for (const c of chartInstances) { try { c.destroy(); } catch(e){} }
  chartInstances = [];
}

/* その日を含む週の開始日("YYYY-MM-DD")。設定「週の始まり」に従う */
function weekStartOf(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  const off = appSettings.weekStart === 'sun' ? d.getDay() : (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - off);
  return fmtDate(d);
}

/* 期間 -> [開始日, 終了日](nullは無制限) */
function periodRange(period){
  const now = new Date();
  const y = now.getFullYear(), mo = now.getMonth();
  switch (period) {
    case 'thisWeek': {
      const mon = weekStartOf(todayStr());
      const sun = new Date(mon + 'T00:00:00');
      sun.setDate(sun.getDate() + 6);
      return [mon, fmtDate(sun)];
    }
    case 'thisMonth': return [fmtDate(new Date(y, mo, 1)), fmtDate(new Date(y, mo + 1, 0))];
    case 'lastMonth': return [fmtDate(new Date(y, mo - 1, 1)), fmtDate(new Date(y, mo, 0))];
    case 'thisYear':  return [`${y}-01-01`, `${y}-12-31`];
    case 'custom':    return [statsCustomFrom || null, statsCustomTo || null];
    default:          return [null, null];
  }
}

function filterByPeriod(records, period){
  const [from, to] = periodRange(period);
  if (!from && !to) return records;
  return records.filter(r => (!from || r.date >= from) && (!to || r.date <= to));
}

/* 集計エンジン: 数値項目の 合計/平均/最大/最小/件数 */
function aggregateNumber(records, fieldId){
  let sum = 0, max = -Infinity, min = Infinity, count = 0;
  for (const r of records) {
    const v = r.values?.[fieldId];
    if (v === undefined || v === null || v === '') continue;
    const n = Number(v);
    if (!isFinite(n)) continue;
    sum += n; count++;
    if (n > max) max = n;
    if (n < min) min = n;
  }
  return { sum, avg: count ? sum / count : 0, max: count ? max : 0, min: count ? min : 0, count };
}

/* select / rating の内訳 {ラベル: 件数} */
function aggregateDistribution(records, field){
  const dist = {};
  if (field.type === 'select') for (const o of field.options || []) dist[o] = 0;
  if (field.type === 'rating') for (let i = 1; i <= 5; i++) dist['★' + i] = 0;
  for (const r of records) {
    const v = r.values?.[field.id];
    if (v === undefined || v === null || v === '') continue;
    const key = field.type === 'rating' ? '★' + v : String(v);
    dist[key] = (dist[key] || 0) + 1;
  }
  return dist;
}

/* 時系列集計: granularity='day'|'week'|'month'、数値項目は期間ごとの合計、なければ件数 */
function timeSeries(records, fieldId, granularity){
  const bucket = {};
  for (const r of records) {
    const key = granularity === 'month' ? r.date.slice(0, 7)
              : granularity === 'week'  ? weekStartOf(r.date)  // 週は月曜日をキーにする
              : r.date;
    let v = 1;
    if (fieldId) {
      const raw = r.values?.[fieldId];
      if (raw === undefined || raw === null || raw === '') continue;
      v = Number(raw);
      if (!isFinite(v)) continue;
    }
    bucket[key] = (bucket[key] || 0) + v;
  }
  const keys = Object.keys(bucket).sort();
  if (!keys.length) return { labels: [], data: [] };
  // 抜けている日/週/月も0で埋めて連続にする
  const labels = [], data = [];
  if (granularity === 'day') {
    const d = new Date(keys[0] + 'T00:00:00');
    const end = keys[keys.length - 1];
    while (fmtDate(d) <= end) {
      const k = fmtDate(d);
      labels.push(k.slice(5).replace('-', '/'));
      data.push(bucket[k] || 0);
      d.setDate(d.getDate() + 1);
    }
  } else if (granularity === 'week') {
    const d = new Date(keys[0] + 'T00:00:00');
    const end = keys[keys.length - 1];
    while (fmtDate(d) <= end) {
      const k = fmtDate(d);
      labels.push(`${d.getMonth() + 1}/${d.getDate()}週`);
      data.push(bucket[k] || 0);
      d.setDate(d.getDate() + 7);
    }
  } else {
    let [y, m] = keys[0].split('-').map(Number);
    const end = keys[keys.length - 1];
    while (true) {
      const k = `${y}-${String(m).padStart(2, '0')}`;
      labels.push(`${y}/${m}`);
      data.push(bucket[k] || 0);
      if (k >= end) break;
      m++; if (m > 12) { m = 1; y++; }
    }
  }
  return { labels, data };
}

/* 内訳ドーナツはジャンル色の濃淡で塗る(モック準拠) */
function donutColors(hex, n){
  const seq = [hex, hex + 'AA', hex + '66', hex + '33', '#D7DDD5', hex + 'DD', hex + '88', hex + '44'];
  return Array.from({ length: n }, (_, i) => seq[i % seq.length]);
}

function renderStats(g, records){
  destroyCharts();
  const body = $('#tab-body');
  const fields = (g.fields || []).slice().sort((a, b) => a.order - b.order);
  const numberFields = fields.filter(f => f.type === 'number');
  const distFields = fields.filter(f => f.type === 'select' || f.type === 'rating');
  const ratingFields = fields.filter(f => f.type === 'rating');
  const checkFields = fields.filter(f => f.type === 'check');
  const filtered = filterByPeriod(records, statsPeriod);

  // メイングラフの対象項目(既定: 先頭の数値項目)
  if (statsChartFieldId && !numberFields.some(f => f.id === statsChartFieldId) && statsChartFieldId !== '__count__') statsChartFieldId = null;
  if (!statsChartFieldId) statsChartFieldId = numberFields.length ? numberFields[0].id : '__count__';

  // 粒度の自動判定(期間が短ければ日次、長ければ月次)
  let autoGran = 'month';
  if (statsPeriod === 'thisWeek' || statsPeriod === 'thisMonth' || statsPeriod === 'lastMonth') autoGran = 'day';
  else if (statsPeriod === 'custom' && statsCustomFrom && statsCustomTo) {
    const span = (new Date(statsCustomTo) - new Date(statsCustomFrom)) / 86400000;
    autoGran = span <= 45 ? 'day' : span <= 200 ? 'week' : 'month';
  }
  const gran = statsGranularity || autoGran;

  let html = `<div class="chips" style="--gcolor:${esc(g.color)}">
    ${PERIODS.map(p => `<button class="${statsPeriod === p.key ? 'on' : ''}" data-period="${p.key}">${p.label}</button>`).join('')}
  </div>`;

  // 任意期間の日付レンジ入力
  if (statsPeriod === 'custom') {
    html += `
      <div class="rangerow">
        <input type="date" id="st-from" value="${esc(statsCustomFrom)}">
        <span class="tilde">〜</span>
        <input type="date" id="st-to" value="${esc(statsCustomTo)}">
        <button class="btn primary" id="st-apply">適用</button>
      </div>`;
  }

  if (!filtered.length) {
    html += `<div class="empty">この期間の記録はありません。<br>期間を変えるか、記録を追加してください。</div>`;
    body.innerHTML = html;
    wirePeriodChips(g, records);
    wireCustomRange(g, records);
    return;
  }

  // 累計マイルストーン(全期間・期間フィルタに依存しない)
  const cum = cumulativeValue(g, records);
  if (cum.value > 0) {
    const msNext = nextMilestone(cum.value);
    const msPrev = prevMilestone(cum.value);
    const msPct = Math.max(2, Math.min(100, Math.round((cum.value - msPrev) / (msNext - msPrev) * 100)));
    html += `
      <div class="chartbox" style="--gcolor:${esc(g.color)}">
        <h3>🏁 累計マイルストーン — ${esc(cum.label)}(全期間)</h3>
        <div class="v" style="font:800 28px/1.2 ui-monospace,'SF Mono',Menlo,monospace">${fmtNum(cum.value)}<small style="font:600 12px 'Hiragino Sans',sans-serif;color:var(--ink-soft)"> ${esc(cum.unit)}</small></div>
        <div class="mstone">
          <div class="ms-bar"><i style="width:${msPct}%"></i></div>
          <div class="ms-txt">前の節目 ${fmtNum(msPrev)} → 次の節目 <b>${fmtNum(msNext)}</b>${esc(cum.unit)} まで あと<b>${fmtNum(msNext - cum.value)}</b></div>
        </div>
      </div>`;
  }

  // サマリーカード(F-4-1: 合計/平均/最大/最小/件数)
  const multi = numberFields.length > 1;
  html += `<div class="grid2">`;
  for (const f of numberFields) {
    const a = aggregateNumber(filtered, f.id);
    const u = f.unit ? ' ' + esc(f.unit) : '';
    const pre = multi ? esc(f.name) + '・' : '';
    html += `
      <div class="statbox"><div class="k">${pre}合計</div><div class="v">${fmtNum(a.sum)}<small>${u}</small></div></div>
      <div class="statbox"><div class="k">${pre}平均</div><div class="v">${a.count ? fmtNum(a.avg) : 0}<small>${u}</small></div></div>
      <div class="statbox"><div class="k">${pre}最大</div><div class="v">${fmtNum(a.max)}<small>${u}</small></div></div>
      <div class="statbox"><div class="k">${pre}最小</div><div class="v">${fmtNum(a.min)}<small>${u}</small></div></div>`;
  }
  for (const f of ratingFields) {
    const a = aggregateNumber(filtered, f.id);
    html += `<div class="statbox"><div class="k">${esc(f.name)}・平均</div><div class="v">${a.count ? fmtNum(a.avg) : '-'}<small> /5</small></div></div>`;
  }
  for (const f of checkFields) {
    const yes = filtered.filter(r => r.values?.[f.id] === true).length;
    html += `<div class="statbox"><div class="k">${esc(f.name)}</div><div class="v">${fmtNum(yes)}<small> 回</small></div></div>`;
  }
  html += `<div class="statbox"><div class="k">記録数</div><div class="v">${fmtNum(filtered.length)}<small> 件</small></div></div>
  </div>`;

  // メイングラフ(時系列: 日次=折れ線、週次・月次=棒)
  const chartAvailable = typeof Chart !== 'undefined';
  const granLabel = gran === 'day' ? '日次' : gran === 'week' ? '週次' : '月次';
  const selField = statsChartFieldId === '__count__' ? null : numberFields.find(f => f.id === statsChartFieldId);
  html += `
    <div class="chartbox">
      <h3>${selField ? esc(selField.name) : '件数'} — 推移(${granLabel})</h3>
      <div class="chartctl">
        <select id="st-field">
          ${numberFields.map(f => `<option value="${f.id}" ${statsChartFieldId === f.id ? 'selected' : ''}>${esc(f.name)}(合計)</option>`).join('')}
          <option value="__count__" ${statsChartFieldId === '__count__' ? 'selected' : ''}>記録件数</option>
        </select>
        <div class="gr">
          <button id="st-day" class="${gran === 'day' ? 'on' : ''}">日</button>
          <button id="st-week" class="${gran === 'week' ? 'on' : ''}">週</button>
          <button id="st-month" class="${gran === 'month' ? 'on' : ''}">月</button>
        </div>
      </div>
      ${chartAvailable ? '<div class="chart-wrap"><canvas id="st-main-chart"></canvas></div>'
        : '<p style="font-size:12px;color:var(--ink-soft)">グラフ描画ライブラリ(Chart.js)を読み込めませんでした。オンライン環境で再読み込みしてください。</p>'}
    </div>`;

  // 内訳ドーナツ(select / rating)
  if (chartAvailable) {
    for (const f of distFields) {
      html += `
        <div class="chartbox">
          <h3>${esc(f.name)}の内訳</h3>
          <div class="chart-wrap donut"><canvas data-donut="${f.id}"></canvas></div>
        </div>`;
    }
  }

  html += `<button class="addgenre" id="st-share">📤 この統計をシェア(X / Instagram / TikTok)</button>`;

  body.innerHTML = html;
  wirePeriodChips(g, records);
  wireCustomRange(g, records);

  const periodLabel = (PERIODS.find(p => p.key === statsPeriod) || {}).label || '';
  $('#st-share').onclick = () => shareStats(g, filtered, periodLabel);

  $('#st-field').onchange = e => { statsChartFieldId = e.target.value; renderStats(g, records); };
  $('#st-day').onclick = () => { statsGranularity = 'day'; renderStats(g, records); };
  $('#st-week').onclick = () => { statsGranularity = 'week'; renderStats(g, records); };
  $('#st-month').onclick = () => { statsGranularity = 'month'; renderStats(g, records); };

  if (!chartAvailable) return;

  // インク/紙のトーンに合わせたChart.js既定色(テーマ設定・ダークモード追従)
  const darkMode = isDarkMode();
  Chart.defaults.color = darkMode ? '#9AA8A3' : '#5C6B67';
  Chart.defaults.borderColor = darkMode ? 'rgba(154,168,163,.18)' : 'rgba(92,107,103,.14)';

  const fieldId = statsChartFieldId === '__count__' ? null : statsChartFieldId;
  const ts = timeSeries(filtered, fieldId, gran);
  const label = selField ? `${selField.name}${selField.unit ? '(' + selField.unit + ')' : ''}` : '記録件数';
  // 設定「推移グラフ」: 自動(日次=折れ線/週・月=棒) or 固定
  const mainType = appSettings.chartType === 'auto' ? (gran === 'day' ? 'line' : 'bar') : appSettings.chartType;
  chartInstances.push(new Chart($('#st-main-chart'), {
    type: mainType,
    data: {
      labels: ts.labels,
      datasets: [{
        label,
        data: ts.data,
        borderColor: g.color,
        backgroundColor: g.color + '55',
        tension: 0.3,
        fill: false,
        pointRadius: ts.labels.length > 62 ? 0 : 2,
        borderWidth: 2,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { maxTicksLimit: 8, font: { size: 10 }, maxRotation: 0 } },
        y: { beginAtZero: true, ticks: { font: { size: 10 } } },
      },
    },
  }));

  for (const f of distFields) {
    const dist = aggregateDistribution(filtered, f);
    const entries = Object.entries(dist).filter(([, n]) => n > 0);
    const canvas = $(`canvas[data-donut="${f.id}"]`);
    if (!entries.length) {
      canvas.closest('.chart-wrap').innerHTML = '<p style="font-size:12px;color:var(--ink-soft);text-align:center;padding-top:80px">データがありません</p>';
      continue;
    }
    chartInstances.push(new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels: entries.map(([k]) => k),
        datasets: [{ data: entries.map(([, n]) => n), backgroundColor: donutColors(g.color, entries.length), borderWidth: 2, borderColor: darkMode ? '#273130' : '#FFFFFF' }],
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '58%',
        plugins: { legend: { position: 'right', labels: { font: { size: 11 }, boxWidth: 12 } } },
      },
    }));
  }
}

function wirePeriodChips(g, records){
  $$('.chips [data-period]').forEach(c => c.onclick = () => {
    statsPeriod = c.dataset.period;
    statsGranularity = null; // 期間変更時は自動粒度に戻す
    if (statsPeriod === 'custom' && !statsCustomFrom) {
      statsCustomFrom = todayStr().slice(0, 7) + '-01'; // 初回は今月をデフォルトにする
      statsCustomTo = todayStr();
    }
    renderStats(g, records);
  });
}

function wireCustomRange(g, records){
  const apply = $('#st-apply');
  if (!apply) return;
  apply.onclick = () => {
    statsCustomFrom = $('#st-from').value;
    statsCustomTo = $('#st-to').value;
    statsGranularity = null;
    renderStats(g, records);
  };
}

/* =====================================================
 * 記録入力モーダル(S-3)
 * ===================================================== */
function fieldInputHTML(f, value){
  const v = value === undefined || value === null ? '' : value;
  switch (f.type) {
    case 'number':
      return `<div class="withunit"><input type="number" step="any" inputmode="decimal" data-fid="${f.id}" value="${esc(v)}" placeholder="数字で入力"><span class="unit">${esc(f.unit || '')}</span></div>`;
    case 'text':
      return `<input type="text" data-fid="${f.id}" value="${esc(v)}" placeholder="${esc(f.name)}を入力">`;
    case 'date':
      return `<input type="date" data-fid="${f.id}" value="${esc(v)}">`;
    case 'select':
      return `<select data-fid="${f.id}">
        <option value="">選択してください</option>
        ${(f.options || []).map(o => `<option value="${esc(o)}" ${String(v) === o ? 'selected' : ''}>${esc(o)}</option>`).join('')}
      </select>`;
    case 'check':
      return `<button type="button" class="toggle ${v === true ? 'on' : ''}" data-fid="${f.id}" aria-label="${esc(f.name)}"></button>`;
    case 'rating': {
      const n = Number(v) || 0;
      return `<div class="stars" data-fid="${f.id}" data-value="${n}">
        ${[1,2,3,4,5].map(i => `<span data-star="${i}" class="${i <= n ? 'on' : ''}">★</span>`).join('')}
        <span class="clearstar" data-clear>クリア</span>
      </div>`;
    }
  }
  return '';
}

function readFieldValue(f, container){
  switch (f.type) {
    case 'number': {
      const raw = $(`input[data-fid="${f.id}"]`, container).value.trim();
      if (raw === '') return undefined;
      const n = Number(raw);
      return isFinite(n) ? n : undefined;
    }
    case 'text': {
      const raw = $(`input[data-fid="${f.id}"]`, container).value.trim();
      return raw === '' ? undefined : raw;
    }
    case 'date': {
      const raw = $(`input[data-fid="${f.id}"]`, container).value;
      return raw === '' ? undefined : raw;
    }
    case 'select': {
      const raw = $(`select[data-fid="${f.id}"]`, container).value;
      return raw === '' ? undefined : raw;
    }
    case 'check':
      return $(`.toggle[data-fid="${f.id}"]`, container).classList.contains('on');
    case 'rating': {
      const n = Number($(`.stars[data-fid="${f.id}"]`, container).dataset.value) || 0;
      return n === 0 ? undefined : n;
    }
  }
  return undefined;
}

/* 記録入力シート。新規時(opts.pickable)はジャンル切替チップ付き(モック準拠) */
function openRecordModal(genre, record = null, opts = {}){
  const fields = (genre.fields || []).slice().sort((a, b) => a.order - b.order);
  const isEdit = !!record;
  const m = openModal(`
    <h3>${isEdit ? '記録を編集' : '記録を追加'}</h3>
    <div id="rm-pick"></div>
    <div class="field"><label>日付<span class="req">*</span></label>
      <input type="date" id="rec-date" value="${esc(record ? record.date : (opts.date || todayStr()))}"></div>
    ${fields.map(f => `
      <div class="field" data-group="${f.id}">
        <label>${esc(f.name)}${f.required ? '<span class="req">*</span>' : ''}</label>
        ${fieldInputHTML(f, record ? record.values?.[f.id] : undefined)}
        <div class="error-msg" style="display:none">「${esc(f.name)}」を${f.type === 'select' ? '選択' : f.type === 'rating' ? 'タップして選択' : '入力'}してください</div>
      </div>`).join('')}
    <div class="field"><label>メモ(任意)</label><textarea id="rec-memo" rows="2">${esc(record ? record.memo || '' : (opts.memo || ''))}</textarea></div>
    <div class="btnrow">
      <button class="btn ghost" id="rec-cancel">キャンセル</button>
      <button class="btn primary" id="rec-save">保存する</button>
    </div>`);

  // ジャンル切替チップ(新規のみ)
  if (!isEdit && opts.pickable) {
    db.getAll('genres').then(gs => {
      gs.sort((a, b) => a.order - b.order);
      if (gs.length < 2) return;
      $('#rm-pick', m.el).innerHTML = `<div class="gpick">${gs.map(x =>
        `<button style="--gcolor:${esc(x.color)}" class="${x.id === genre.id ? 'on' : ''}" data-gid="${x.id}">${esc(x.icon)} ${esc(x.name)}</button>`).join('')}</div>`;
      $$('#rm-pick button', m.el).forEach(b => b.onclick = () => {
        if (b.dataset.gid === genre.id) return;
        const date = $('#rec-date', m.el).value;
        const memo = $('#rec-memo', m.el).value;
        m.close();
        openRecordModal(gs.find(x => x.id === b.dataset.gid), null, { pickable: true, date, memo });
      });
    });
  }

  // 評価(★)
  $$('.stars', m.el).forEach(w => {
    w.addEventListener('click', e => {
      const star = e.target.closest('[data-star]');
      if (star) w.dataset.value = star.dataset.star;
      else if (e.target.closest('[data-clear]')) w.dataset.value = 0;
      else return;
      const n = Number(w.dataset.value);
      $$('span[data-star]', w).forEach((s, i) => s.classList.toggle('on', i < n));
    });
  });
  // チェック(トグル)
  $$('.toggle[data-fid]', m.el).forEach(t => {
    t.style.setProperty('--gcolor', genre.color);
    t.onclick = () => t.classList.toggle('on');
  });

  $('#rec-cancel', m.el).onclick = () => m.close();
  $('#rec-save', m.el).onclick = async () => {
    const date = $('#rec-date', m.el).value;
    if (!date) { $('#rec-date', m.el).classList.add('field-error'); return; }

    // 必須検証
    let ok = true;
    const values = {};
    for (const f of fields) {
      const v = readFieldValue(f, m.el);
      const group = $(`[data-group="${f.id}"]`, m.el);
      const missing = f.required && f.type !== 'check' && (v === undefined);
      $('.error-msg', group).style.display = missing ? '' : 'none';
      if (missing) { ok = false; continue; }
      if (v !== undefined) values[f.id] = v;
    }
    if (!ok) return;

    // 定義に存在しない旧項目の値は残置(削除しない)
    if (isEdit && record.values) {
      const known = new Set(fields.map(f => f.id));
      for (const [k, v] of Object.entries(record.values)) {
        if (!known.has(k) && !(k in values)) values[k] = v;
      }
    }

    const now = new Date().toISOString();
    const rec = isEdit
      ? { ...record, date, values, memo: $('#rec-memo', m.el).value.trim(), updatedAt: now }
      : { id: uid(), genreId: genre.id, date, values, memo: $('#rec-memo', m.el).value.trim(), createdAt: now, updatedAt: now };

    // 累計マイルストーン判定(保存前後の累計を比較)
    const freshGenre = await db.get('genres', genre.id) || genre;
    const before = cumulativeValue(freshGenre, await db.getRecordsByGenre(genre.id));
    await db.put('records', rec);
    await db.setMeta('lastGenreId', genre.id); // FABの記録先で前回選択を記憶
    const after = cumulativeValue(freshGenre, await db.getRecordsByGenre(genre.id));

    m.close();
    toast(isEdit ? '更新しました ✓' : '保存しました ✓');
    route();

    // 跨いだ節目のうち最大のものを祝う
    let crossed = 0;
    for (let ms = nextMilestone(before.value); ms <= after.value; ms = nextMilestone(ms)) crossed = ms;
    if (crossed > 0) setTimeout(() => showMilestoneCelebration(genre, crossed, after.unit), 350);
  };
}

/* =====================================================

    <div class="sethead">項目の定義 — 基本項目+自由追加</div>

    <div id="ge-fields">

        <div class="swipe-wrap">

        <div class="frow" data-fid="${f.id}">

          ${f.id === homeFieldId ? '<span class="badge">ホーム</span>' : ''}${f.preset ? '<span class="badge preset">基本</span>' : ''}${f.required ? '<span class="badge">必須</span>' : ''}

    const idx = fs.findIndex(f => f.id === fid);
    if (idx < 0) return;

    if (e.target.closest('[data-fedit]')) { openFieldEditModal(g, fs[idx]); return; }
    if (e.target.closest('[data-fdel]')) { await deleteFieldFlow(fresh, fs[idx]); return; }
  });

  // 左スワイプ → 削除(追加項目のみ。既存の影響件数confirmへ)
  if (list) enableSwipeDelete(list, '.frow', async wrap => {
    const fid = wrap.querySelector('.frow')?.dataset.fid;
    const fresh = await db.get('genres', id);
    const field = fresh.fields.find(x => x.id === fid);
    if (field) await deleteFieldFlow(fresh, field);
  });

  // ドラッグ(⠿ハンドル or 行の長押し)で並べ替え
  if (list) enableFieldDrag(list, async () => {
    const orderIds = $$('#ge-fields .frow').map(r => r.dataset.fid);
    const fresh = await db.get('genres', id);
    fresh.fields.forEach(f => { f.order = orderIds.indexOf(f.id); });
    fresh.updatedAt = new Date().toISOString();
    await db.put('genres', fresh);
    toast('並び順を変更しました');
    renderGenreEdit(id);
  });

  // ジャンル削除(件数表示 + ジャンル名の入力一致で解錠)
  $('#ge-delete').onclick = () => openGenreDeleteModal(g, recordCount);

  maybeTour('tour_edit', EDIT_TOUR); // 初めて開いたときだけ操作ツアー
}

/* 左スワイプで削除ボタンを表示する(iOS風)。onDeleteは既存の確認フローを呼ぶ */
function enableSwipeDelete(container, itemSel, onDelete){
  const OPEN = -96;
  let sw = null;           // { wrap, item, startX, startY, base, active }
  let suppressClick = false;

  const setX = (wrap, x, animate = true) => {
    const item = wrap.querySelector(itemSel);
    if (!item) return;
    item.style.transition = animate ? 'transform .2s ease' : 'none';
    item.style.transform = x ? `translateX(${x}px)` : '';
    wrap.classList.toggle('open', x !== 0);
  };
  const closeAll = except => $$('.swipe-wrap.open', container).forEach(w => { if (w !== except) setX(w, 0); });

  container.addEventListener('pointerdown', e => {
    const item = e.target.closest(itemSel);
    const wrap = e.target.closest('.swipe-wrap');
    if (!item || !wrap || e.target.closest('[data-drag]') || e.target.closest('.swipe-del')) return;
    if (!wrap.querySelector('.swipe-del')) return; // 削除できない行は対象外
    sw = { wrap, item, startX: e.clientX, startY: e.clientY, base: wrap.classList.contains('open') ? OPEN : 0, active: false };
  });
  container.addEventListener('pointermove', e => {
    if (!sw) return;
    if (document.querySelector('.frow-ghost')) { sw = null; return; } // ドラッグ並べ替え中は無効
    const dx = e.clientX - sw.startX, dy = e.clientY - sw.startY;
    if (!sw.active) {
      if (Math.abs(dy) > 14 && Math.abs(dy) > Math.abs(dx)) { sw = null; return; } // 縦=スクロール
      if (Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy) * 1.3) { sw.active = true; closeAll(sw.wrap); }
      else return;
    }
    setX(sw.wrap, Math.min(0, Math.max(-120, sw.base + dx)), false);
  });
  const finish = e => {
    if (!sw) return;
    if (sw.active) {
      const dx = e.clientX - sw.startX;
      const x = sw.base + dx;
      setX(sw.wrap, x < OPEN / 2 ? OPEN : 0);
      suppressClick = true;
    } else if (sw.base === OPEN) {
      setX(sw.wrap, 0); // 開いた状態で行をタップ → 閉じるだけ
      suppressClick = true;
    }
    sw = null;
  };
  container.addEventListener('pointerup', finish);
  container.addEventListener('pointercancel', finish);
  container.addEventListener('touchmove', e => { if (sw && sw.active) e.preventDefault(); }, { passive: false });
  // スワイプ直後のタップ誤爆(カード遷移・編集モーダル)を抑止
  container.addEventListener('click', e => {
    if (suppressClick) { e.stopPropagation(); e.preventDefault(); suppressClick = false; return; }
    const del = e.target.closest('.swipe-del');
    if (del) {
      e.stopPropagation();
      const wrap = del.closest('.swipe-wrap');
      setX(wrap, 0);
      onDelete(wrap);
    }
  }, true);
}

/* 項目リストのドラッグ並べ替え(⠿は即ドラッグ、行は長押し350msで開始) */
function enableFieldDrag(list, onDrop){
  let drag = null;   // { row, ghost, dy }
  let lpTimer = null, lpStart = null;

  function startDrag(row, clientY){
    row = row.closest('.swipe-wrap') || row; // スワイプラッパーごと動かす
    cancelLp();
    const r = row.getBoundingClientRect();
    const ghost = row.cloneNode(true);
    ghost.classList.add('frow-ghost');
    ghost.style.left = r.left + 'px';
    ghost.style.top = r.top + 'px';
    ghost.style.width = r.width + 'px';
    document.body.appendChild(ghost);
    row.classList.add('drag-src');
    drag = { row, ghost, dy: clientY - r.top };
    if (navigator.vibrate) navigator.vibrate(12); // 持ち上げの触覚フィードバック
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    window.addEventListener('pointercancel', onUp);
  }
  function onMove(e){
    if (!drag) return;
    e.preventDefault();
    drag.ghost.style.top = (e.clientY - drag.dy) + 'px';
    // ポインタ位置に応じて元行を差し替え(空いた場所に他の行が詰まる)
    const rows = [...list.children].filter(el => el !== drag.row);
    let target = null;
    for (const r of rows) {
      const b = r.getBoundingClientRect();
      if (e.clientY < b.top + b.height / 2) { target = r; break; }
    }
    if (target) { if (target.previousElementSibling !== drag.row) list.insertBefore(drag.row, target); }
    else if (list.lastElementChild !== drag.row) list.appendChild(drag.row);
  }
  function onUp(){
    if (!drag) return;
    drag.ghost.remove();
    drag.row.classList.remove('drag-src');
    drag = null;
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    window.removeEventListener('pointercancel', onUp);
    onDrop();
  }
  function cancelLp(){ if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } lpStart = null; }

  list.addEventListener('pointerdown', e => {
    const row = e.target.closest('.frow');
    if (!row || drag) return;
    if (e.target.closest('[data-fedit], [data-fdel]')) return;
    if (e.target.closest('[data-drag]')) { e.preventDefault(); startDrag(row, e.clientY); return; }
    // 行の長押し(350ms)。その間に動いたら通常スクロール扱い
    lpStart = { x: e.clientX, y: e.clientY };
    lpTimer = setTimeout(() => startDrag(row, lpStart.y), 350);
  });
  list.addEventListener('pointermove', e => {
    if (!drag && lpTimer && lpStart && Math.hypot(e.clientX - lpStart.x, e.clientY - lpStart.y) > 10) cancelLp();
  });
  list.addEventListener('pointerup', cancelLp);
  list.addEventListener('pointercancel', cancelLp);
  // ドラッグ中はタッチスクロールを止める
  list.addEventListener('touchmove', e => { if (drag) e.preventDefault(); }, { passive: false });
}

/* 項目に値が入っている記録の件数 */
async function countRecordsWithField(genreId, fieldId){
  const records = await db.getRecordsByGenre(genreId);
  return records.filter(r => {
    const v = r.values?.[fieldId];
    return v !== undefined && v !== null && v !== '';
  }).length;
}

/* 項目削除フロー: 影響件数表示 + confirm */
async function deleteFieldFlow(genre, field){
  if (field.preset) { toast('基本項目は削除できません'); return; }
  const n = await countRecordsWithField(genre.id, field.id);
  const msg = `項目「${field.name}」を削除しますか?` +
    (n > 0 ? `\n※ ${n} 件の記録にこの項目の値があります(値は残置され非表示になります)` : '');
  if (!confirm(msg)) return;
  genre.fields = genre.fields.filter(f => f.id !== field.id);
  if (genre.repFieldId === field.id) delete genre.repFieldId; // ホーム表示項目だった場合は自動に戻す
  genre.fields.slice().sort((a, b) => a.order - b.order).forEach((f, i) => f.order = i);
  genre.updatedAt = new Date().toISOString();
  await db.put('genres', genre); // records側の値は残置(表示時に定義側でフィルタ)
  toast('項目を削除しました');
  renderGenreEdit(genre.id);
}

/* 項目の追加・編集シート */
function openFieldEditModal(genre, field){
  if (field && field.preset) { toast('基本項目は固定です(追加した項目のみ編集できます)'); return; }
  const isEdit = !!field;
  const f = field || { name: '', type: 'number', unit: '', options: [], required: false };
  const m = openModal(`
    <h3>${isEdit ? '項目を編集' : '項目を追加'} — ${esc(genre.icon)} ${esc(genre.name)}</h3>
    <div class="banner" style="margin:0 0 14px"><span class="b-main">「項目」は記録フォームの入力欄です(例: 学習時間・教材名)。<b>毎日の数値や内容は、保存後に「＋ 記録」ボタンから入力します。</b></span></div>
    <div class="field"><label>項目名<span class="req">*</span></label>
      <input type="text" id="fe-name" value="${esc(f.name)}" maxlength="20" placeholder="例: 学習時間">
      <div class="hint">「なにを記録するか」の名前です。</div></div>
    <div class="field"><label>型 — 記録のかたち</label>
      <select id="fe-type">
        ${Object.entries(FIELD_TYPES).map(([k, t]) => `<option value="${k}" ${f.type === k ? 'selected' : ''}>${t.label}</option>`).join('')}
      </select>
      <div class="hint" id="fe-type-help">${TYPE_HELP[f.type] || ''}</div></div>
    <div class="field" id="fe-unit-group" style="display:${f.type === 'number' ? '' : 'none'}"><label>単位(任意)</label>
      <input type="text" id="fe-unit" value="${esc(f.unit || '')}" maxlength="10" placeholder="分 / km / 円 / ページ など">
      <div class="hint">数値の後ろにつく“ラベル”です。数量そのもの(60など)は「＋ 記録」で入力します。<br>例:「60分」と記録したい → 単位は「分」、60は記録時に入力。</div></div>
    <div class="field" id="fe-options-group" style="display:${f.type === 'select' ? '' : 'none'}"><label>選択肢(カンマ区切り)<span class="req">*</span></label>
      <input type="text" id="fe-options" value="${esc((f.options || []).join(', '))}" placeholder="晴れ, くもり, 雨"></div>
    <div class="field"><label>必須にする</label>
      <button type="button" class="toggle ${f.required ? 'on' : ''}" id="fe-required" style="--gcolor:${esc(genre.color)}" aria-label="必須"></button></div>
    <div class="btnrow">
      <button class="btn ghost" id="fe-cancel">キャンセル</button>
      <button class="btn primary" id="fe-save">${isEdit ? '更新する' : '追加する'}</button>
    </div>`);

  $('#fe-required', m.el).onclick = e => e.currentTarget.classList.toggle('on');
  $('#fe-type', m.el).onchange = () => {
    const t = $('#fe-type', m.el).value;
    $('#fe-unit-group', m.el).style.display = t === 'number' ? '' : 'none';
    $('#fe-options-group', m.el).style.display = t === 'select' ? '' : 'none';
    $('#fe-type-help', m.el).textContent = TYPE_HELP[t] || ''; // 型に応じた説明を表示
  };
  $('#fe-cancel', m.el).onclick = () => m.close();
  $('#fe-save', m.el).onclick = async () => {
    const name = $('#fe-name', m.el).value.trim();
    const type = $('#fe-type', m.el).value;
    const unit = $('#fe-unit', m.el).value.trim();
    const options = $('#fe-options', m.el).value.split(/[、,]/).map(s => s.trim()).filter(Boolean);
    const required = $('#fe-required', m.el).classList.contains('on');
    if (!name) { $('#fe-name', m.el).classList.add('field-error'); return; }
    if (type === 'select' && options.length === 0) { $('#fe-options', m.el).classList.add('field-error'); return; }

    // 単位に数字だけが入っている場合は誤入力の可能性が高いため確認する
    if (type === 'number' && /^[0-9０-９.,]+$/.test(unit)) {
      if (!confirm(`単位に数字「${unit}」が入力されています。\n単位は「分」「km」のような“ラベル”です。\n数量(${unit}など)は保存後に「＋ 記録」から入力してください。\n\nこのまま「${unit}」を単位として保存しますか?`)) {
        $('#fe-unit', m.el).classList.add('field-error');
        $('#fe-unit', m.el).focus();
        return;
      }
    }

    const fresh = await db.get('genres', genre.id);

    // 記録が1件以上ある項目の型変更は、影響件数を示して確認
    if (isEdit && type !== field.type) {
      const n = await countRecordsWithField(genre.id, field.id);
      if (n > 0 && !confirm(`この項目には ${n} 件の記録の値があります。\n型を「${FIELD_TYPES[field.type].label}」から「${FIELD_TYPES[type].label}」に変更すると、既存の値が正しく表示・集計されない場合があります。\n(推奨: 型は変更せず、新しい項目として追加する)\n\nそれでも変更しますか?`)) {
        return;
      }
    }

    if (isEdit) {
      const target = fresh.fields.find(x => x.id === field.id);
      if (!target) { m.close(); return; }
      Object.assign(target, { name, type, unit: type === 'number' ? unit : '', options: type === 'select' ? options : undefined, required });
    } else {
      fresh.fields.push({
        id: uid(), name, type,
        unit: type === 'number' ? unit : '',
        options: type === 'select' ? options : undefined,
        required, preset: false,
        order: fresh.fields.length ? Math.max(...fresh.fields.map(x => x.order)) + 1 : 0,
      });
    }
    fresh.updatedAt = new Date().toISOString();
    await db.put('genres', fresh);
    m.close();
    toast(isEdit ? '項目を更新しました' : '項目を追加しました');
    renderGenreEdit(genre.id);
  };
}

/* =====================================================
 * データ管理(エクスポート/インポート/全削除)
 * ===================================================== */
function downloadFile(filename, content, mime){
  const blob = new Blob([content], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
}

async function exportJSON(){
  const [genres, records] = await Promise.all([db.getAll('genres'), db.getAll('records')]);
  const payload = {
    app: 'mystats',
    version: 1,
    exportedAt: new Date().toISOString(),
    genres, records,
  };
  downloadFile(`mystats_backup_${todayStr().replace(/-/g, '')}.json`, JSON.stringify(payload, null, 2), 'application/json');
  await db.setMeta('lastExportAt', payload.exportedAt);
  toast('エクスポートしました');
}

/* インポート: スキーマ検証 */
function validateImport(obj){
  const errors = [];
  if (!obj || typeof obj !== 'object') return ['JSONの形式が不正です'];
  if (obj.app !== 'mystats') errors.push('MyStatsのバックアップファイルではありません(appキー不一致)');
  if (obj.version !== 1) errors.push(`対応していないバージョンです(version: ${obj.version ?? 'なし'})`);
  if (!Array.isArray(obj.genres)) errors.push('genres が配列ではありません');
  if (!Array.isArray(obj.records)) errors.push('records が配列ではありません');
  if (errors.length) return errors;
  for (const g of obj.genres) {
    if (!g.id || typeof g.name !== 'string' || !Array.isArray(g.fields)) { errors.push('ジャンルデータの形式が不正です'); break; }
  }
  for (const r of obj.records) {
    if (!r.id || !r.genreId || typeof r.date !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(r.date)) { errors.push('記録データの形式が不正です(id/genreId/date)'); break; }
  }
  return errors;
}

async function importJSON(file){
  let obj;
  try { obj = JSON.parse(await file.text()); }
  catch(e){ alert('JSONの解析に失敗しました: ' + e.message); return; }
  const errors = validateImport(obj);
  if (errors.length) { alert('インポートできません:\n・' + errors.join('\n・')); return; }

  const [curGenres, curRecords] = await Promise.all([db.getAll('genres'), db.getAll('records')]);
  const genreIds = new Set(curGenres.map(g => g.id));
  const recordIds = new Set(curRecords.map(r => r.id));
  const dupGenres = obj.genres.filter(g => genreIds.has(g.id));
  const dupRecords = obj.records.filter(r => recordIds.has(r.id));

  let mode = 'add';
  if (dupGenres.length || dupRecords.length) {
    mode = await askImportMode(dupGenres.length, dupRecords.length);
    if (!mode) return; // キャンセル
  }

  let genres = obj.genres.map(g => ({ ...g }));
  let records = obj.records.map(r => ({ ...r }));

  if (mode === 'newid') {
    // 重複IDのジャンルには新IDを割り当て、配下recordsのgenreIdも付け替える
    const genreMap = {};
    for (const g of genres) {
      if (genreIds.has(g.id)) { const nid = uid(); genreMap[g.id] = nid; g.id = nid; }
    }
    for (const r of records) {
      if (genreMap[r.genreId]) r.genreId = genreMap[r.genreId];
      if (recordIds.has(r.id)) r.id = uid();
    }
  }
  // mode === 'replace' は同一IDをそのまま put(上書き)

  // 新規追加になるジャンルは既存の後ろに並べる(置換はインポート元のorderを維持)
  let nextOrder = curGenres.length ? Math.max(...curGenres.map(g => g.order)) + 1 : 0;
  for (const g of genres) {
    if (!genreIds.has(g.id)) g.order = nextOrder++;
  }

  await db.bulkPut('genres', genres);
  await db.bulkPut('records', records);
  toast(`インポート完了(ジャンル${genres.length}件・記録${fmtNum(records.length)}件)`);
  route();
}

/* 重複ID時の取込方法を選択(置換 / 新IDで取込 / キャンセル) */
function askImportMode(nGenres, nRecords){
  return new Promise(resolve => {
    const m = openModal(`
      <h3>⚠ IDが重複しています</h3>
      <p style="font-size:13px;margin-bottom:14px">
        既存データとIDが重複しています(ジャンル ${nGenres} 件・記録 ${fmtNum(nRecords)} 件)。<br>取込方法を選んでください。
      </p>
      <button class="btn primary" id="im-replace" style="width:100%;margin-bottom:8px">置換(既存の同IDデータを上書き)</button>
      <button class="btn ghost" id="im-newid" style="width:100%;margin-bottom:8px">新IDで取込(既存を残して複製)</button>
      <button class="btn ghost" id="im-cancel" style="width:100%">キャンセル</button>`);
    let done = false;
    const finish = v => { if (!done) { done = true; m.close(); resolve(v); } };
    $('#im-replace', m.el).onclick = () => finish('replace');
    $('#im-newid', m.el).onclick = () => finish('newid');
    $('#im-cancel', m.el).onclick = () => finish(null);
    m.onClose(() => finish(null)); // 背景タップ・Escで閉じた場合はキャンセル扱い
  });
}

/* ジャンル別CSVエクスポート */
function csvEscape(v){
  const s = String(v ?? '');
  return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

async function exportCSV(genreId){
  const g = await db.get('genres', genreId);
  if (!g) return;
  const fields = (g.fields || []).slice().sort((a, b) => a.order - b.order);
  const records = (await db.getRecordsByGenre(genreId)).sort((a, b) => a.date < b.date ? 1 : -1);
  const header = ['日付', ...fields.map(f => f.name + (f.unit ? `(${f.unit})` : '')), 'メモ'];
  const lines = [header.map(csvEscape).join(',')];
  for (const r of records) {
    const row = [r.date];
    for (const f of fields) {
      const v = r.values?.[f.id];
      row.push(f.type === 'check' ? (v === true ? '1' : '') : (v ?? ''));
    }
    row.push(r.memo || '');
    lines.push(row.map(csvEscape).join(','));
  }
  // BOM付きUTF-8(Excel対応)
  downloadFile(`mystats-${g.name}-${todayStr()}.csv`, '\uFEFF' + lines.join('\r\n'), 'text/csv');
  toast('CSVをエクスポートしました');
}

function openDeleteAllModal(){
