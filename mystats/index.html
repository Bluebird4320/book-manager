/* =====================================================
 * SNSシェア(APIキー不要・トークン保存なしの安全な方式)
 *  - モバイル: シェア画像を生成して端末の共有シートへ(X/Instagram/TikTok/LINE等)
 *  - PC等: 画像をダウンロード + Xの投稿画面を開くフォールバック
 * ===================================================== */
function roundRectPath(x, x0, y0, w, h, r){
  x.beginPath();
  x.moveTo(x0 + r, y0);
  x.arcTo(x0 + w, y0, x0 + w, y0 + h, r);
  x.arcTo(x0 + w, y0 + h, x0, y0 + h, r);
  x.arcTo(x0, y0 + h, x0, y0, r);
  x.arcTo(x0, y0, x0 + w, y0, r);
  x.closePath();
}

/* モック調(方眼紙+FIELD NOTES)のシェア画像を生成 */
async function buildShareCard(genre, subtitle, lines){
  const W = 1080, H = 1080;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const x = c.getContext('2d');
  const JP = '"Hiragino Sans","Noto Sans JP",sans-serif';
  x.fillStyle = '#F5F7F3'; x.fillRect(0, 0, W, H);
  x.strokeStyle = '#E4EAE2'; x.lineWidth = 2;
  for (let i = 0; i <= W; i += 72) {
    x.beginPath(); x.moveTo(i, 0); x.lineTo(i, H); x.stroke();
    x.beginPath(); x.moveTo(0, i); x.lineTo(W, i); x.stroke();
  }
  x.fillStyle = '#22302E'; x.font = '800 68px ' + JP; x.fillText('MyStats', 80, 140);
  // ロゴの実測幅から配置(フォント差による「FIELD NOTES」の重なりを防ぐ)
  const logoW = x.measureText('MyStats').width;
  x.fillStyle = '#5C6B67'; x.font = '600 30px ' + JP; x.fillText('FIELD NOTES', 80 + logoW + 26, 138);
  x.fillStyle = 'rgba(34,48,46,.35)';
  for (let i = 80; i < W - 80; i += 20) x.fillRect(i, 168, 2, 14);
  x.save();
  x.shadowColor = 'rgba(34,48,46,.12)'; x.shadowBlur = 30; x.shadowOffsetY = 8;
  x.fillStyle = '#FFFFFF'; roundRectPath(x, 80, 240, W - 160, 640, 28); x.fill();
  x.restore();
  x.strokeStyle = '#DCE3DB'; x.lineWidth = 2; roundRectPath(x, 80, 240, W - 160, 640, 28); x.stroke();
  x.fillStyle = genre.color; x.fillRect(80, 246, 14, 628);
  x.font = '84px ' + JP; x.fillText(genre.icon, 150, 386);
  x.fillStyle = '#22302E'; x.font = '800 62px ' + JP; x.fillText(genre.name, 268, 378, 620);
  x.fillStyle = '#5C6B67'; x.font = '600 40px ' + JP; x.fillText(subtitle, 150, 470, W - 320);
  x.fillStyle = '#22302E'; x.font = '700 48px ' + JP;
  lines.slice(0, 5).forEach((l, i) => x.fillText(l, 150, 566 + i * 66, W - 320));
  x.fillStyle = '#5C6B67'; x.font = '600 34px ' + JP; x.fillText('#MyStats', 80, H - 56);
  return new Promise(res => c.toBlob(res, 'image/png'));
}

async function shareContent(text, blob){
  const file = blob ? new File([blob], 'mystats.png', { type: 'image/png' }) : null;
  if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], text }); return; }
    catch (e) { if (e.name === 'AbortError') return; }
  }
  // フォールバック: 画像を保存し、Xの投稿画面を開く(Instagram/TikTokは保存画像を添付)
  if (blob) downloadFile('mystats-share.png', blob, 'image/png');
  window.open('https://x.com/intent/post?text=' + encodeURIComponent(text), '_blank', 'noopener');
  toast('画像を保存しました。X / Instagram / TikTok に添付できます');
}

async function shareRecord(genre, rec){
  const fields = (genre.fields || []).slice().sort((a, b) => a.order - b.order);
  const lines = [];
  for (const f of fields) {
    const v = rec.values?.[f.id];
    if (v === undefined || v === null || v === '') continue;
    if (f.type === 'rating') lines.push('★'.repeat(Math.max(0, Math.min(5, Number(v) || 0))));
    else if (f.type === 'check') { if (v === true) lines.push('✓' + f.name); }
    else if (f.type === 'number') lines.push(`${f.name} ${fmtNum(Number(v))}${f.unit || ''}`);
    else lines.push(`${f.name} ${v}`);
    if (lines.length >= 5) break;
  }
  const text = `${genre.icon} ${genre.name} ${dateLabel(rec.date)}\n${lines.join(' / ')}\n#MyStats`;
  const blob = await buildShareCard(genre, dateLabel(rec.date), lines);
  await shareContent(text, blob);
}

async function shareStats(genre, records, periodLabel){
  const fields = (genre.fields || []).slice().sort((a, b) => a.order - b.order);
  const lines = [];
  for (const f of fields.filter(x => x.type === 'number').slice(0, 3)) {
    const a = aggregateNumber(records, f.id);
    lines.push(`${f.name} 合計 ${fmtNum(a.sum)}${f.unit ? ' ' + f.unit : ''}`);
  }
  lines.push(`記録数 ${fmtNum(records.length)} 件`);
  const text = `${genre.icon} ${genre.name}(${periodLabel})\n${lines.join(' / ')}\n#MyStats`;
  const blob = await buildShareCard(genre, `${periodLabel}のきろく`, lines);
  await shareContent(text, blob);
}

/* =====================================================
 * パスコード & Face ID ロック
 *  - パスコードは平文保存せずPBKDF2(15万回)でハッシュ化してmetaに保存
 *  - 生体認証はWebAuthn(端末内認証器)。鍵は端末のセキュア領域に保存され外部送信なし
 *  - 注意: 端末内の閲覧防止ロックであり、データ自体の暗号化ではない
 * ===================================================== */
const b64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
const unb64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function hashPin(pin, saltB64){
  const key = await crypto.subtle.importKey('raw', new TextEncoder().encode(pin), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt: unb64(saltB64), iterations: 150000, hash: 'SHA-256' }, key, 256);
  return b64(bits);
}

async function biometricAvailable(){
  try {
    return !!(window.isSecureContext && window.PublicKeyCredential &&
      await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable());
  } catch (e) { return false; }
}

async function registerBio(lock){
  const cred = await navigator.credentials.create({ publicKey: {
    challenge: crypto.getRandomValues(new Uint8Array(32)),
    rp: { name: 'MyStats' },
    user: { id: crypto.getRandomValues(new Uint8Array(16)), name: 'mystats', displayName: 'MyStats' },
    pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
    authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
    timeout: 60000,
  }});
  lock.webauthn = b64(cred.rawId);
  await db.setMeta('lock', lock);
}

async function requireUnlockIfNeeded(){
  const lock = await db.getMeta('lock');
  if (!lock || !lock.enabled) return;
  await showLockScreen(lock);
}

function showLockScreen(lock){
  return new Promise(resolve => {
    const ov = document.createElement('div');
    ov.className = 'lock-overlay';
    ov.innerHTML = `
      <div class="lockicon">🔒</div><h2>MyStats</h2>
      <div class="pin-dots">${'<span></span>'.repeat(4)}</div>
      <div class="lock-msg" id="lock-msg"></div>
      <div class="pin-pad" id="pin-pad">
        ${[1,2,3,4,5,6,7,8,9].map(n => `<button data-n="${n}">${n}</button>`).join('')}
        <button class="ghostkey" data-bio ${lock.webauthn ? '' : 'style="visibility:hidden"'}>👤</button>
        <button data-n="0">0</button>
        <button class="ghostkey" data-del>⌫</button>
      </div>
      ${lock.webauthn ? '<button class="lock-bio" data-bio>Face ID / 指紋で解除</button>' : ''}`;
    document.body.appendChild(ov);
    let pin = '', fails = 0, lockedUntil = 0;
    const dots = ov.querySelectorAll('.pin-dots span');
    const msg = ov.querySelector('#lock-msg');
    const paint = () => dots.forEach((d, i) => d.classList.toggle('on', i < pin.length));
    const unlock = () => { ov.remove(); resolve(); };
    async function tryPin(){
      if (await hashPin(pin, lock.salt) === lock.hash) { unlock(); return; }
      fails++; pin = ''; paint();
      const pd = ov.querySelector('.pin-dots');
      pd.classList.add('shake');
      setTimeout(() => pd.classList.remove('shake'), 300);
      if (fails >= 5) { lockedUntil = Date.now() + 30000; msg.textContent = '試行回数が多すぎます。30秒待ってからお試しください'; }
      else msg.textContent = 'パスコードが違います';
    }
    async function tryBio(){
      try {
        await navigator.credentials.get({ publicKey: {
          challenge: crypto.getRandomValues(new Uint8Array(32)),
          allowCredentials: [{ type: 'public-key', id: unb64(lock.webauthn) }],
          userVerification: 'required', timeout: 60000,
        }});
        unlock();
      } catch (e) { msg.textContent = '生体認証に失敗しました。パスコードを入力してください'; }
    }
    ov.addEventListener('click', e => {
      const b = e.target.closest('button');
      if (!b) return;
      if (Date.now() < lockedUntil) return;
      if (fails >= 5) { fails = 0; msg.textContent = ''; }
      if (b.dataset.n !== undefined) {
        if (pin.length < 4) { pin += b.dataset.n; paint(); if (pin.length === 4) tryPin(); }
      } else if (b.hasAttribute('data-del')) { pin = pin.slice(0, -1); paint(); }
      else if (b.hasAttribute('data-bio') && lock.webauthn) tryBio();
    });
    if (lock.webauthn) tryBio(); // 起動時にまず生体認証を試す
  });
}

/* 設定: ロックのセットアップ・管理 */
function openPinSetup(existing){
  const m = openModal(`
    <h3>🔒 パスコードを設定</h3>
    <p style="font-size:13px;color:var(--ink-soft);margin-bottom:12px">
      アプリを開くときに4桁のパスコードを求めます。<br>
      ※ パスコードを忘れると解除できません(全データ削除が必要になります)。必ず控えてください。
    </p>
    <div class="field"><label>パスコード(数字4桁)</label><input type="password" id="pin1" inputmode="numeric" maxlength="4" autocomplete="off"></div>
    <div class="field"><label>もう一度入力</label><input type="password" id="pin2" inputmode="numeric" maxlength="4" autocomplete="off"></div>
    <div class="error-msg" id="pin-err" style="display:none"></div>
    <div class="btnrow">
      <button class="btn ghost" id="pin-cancel">キャンセル</button>
      <button class="btn primary" id="pin-save">設定する</button>
    </div>`);
  $('#pin-cancel', m.el).onclick = () => m.close();
  $('#pin-save', m.el).onclick = async () => {
    const p1 = $('#pin1', m.el).value, p2 = $('#pin2', m.el).value;
    const err = $('#pin-err', m.el);
    if (!/^\d{4}$/.test(p1)) { err.textContent = '数字4桁で入力してください'; err.style.display = ''; return; }
    if (p1 !== p2) { err.textContent = '入力が一致しません'; err.style.display = ''; return; }
    const salt = b64(crypto.getRandomValues(new Uint8Array(16)));
    const lock = { enabled: true, salt, hash: await hashPin(p1, salt), webauthn: existing ? existing.webauthn : null };
    await db.setMeta('lock', lock);
    m.close();
    toast(existing ? 'パスコードを変更しました' : 'パスコードを設定しました');
    if (!existing && await biometricAvailable() && confirm('Face ID / 指紋でも解除できるようにしますか?')) {
      try { await registerBio(lock); toast('生体認証を登録しました'); }
      catch (e) { toast('生体認証の登録をキャンセルしました'); }
    }
    renderSettings();
  };
}

async function openLockSettings(){
  if (!(crypto && crypto.subtle)) { alert('この環境ではロック機能を利用できません(セキュアコンテキストが必要です)'); return; }
  const lock = await db.getMeta('lock');
  if (!lock || !lock.enabled) { openPinSetup(null); return; }
  const bioAvail = await biometricAvailable();
  const m = openModal(`
    <h3>🔒 パスコード & Face ID</h3>
    <div class="setrow" id="lk-change"><span>パスコードを変更</span><span class="arr">›</span></div>
    ${(bioAvail || lock.webauthn) ? `<div class="setrow" id="lk-bio"><span>Face ID / 指紋で解除</span><span class="valtxt">${lock.webauthn ? 'オン' : 'オフ'}</span><span class="arr">›</span></div>` : ''}
    <div class="setrow warn" id="lk-off"><span>ロックをオフにする</span><span class="arr">›</span></div>`);
  $('#lk-change', m.el).onclick = () => { m.close(); verifyPinThen(lock, () => openPinSetup(lock)); };
  const bio = $('#lk-bio', m.el);
  if (bio) bio.onclick = async () => {
    m.close();
    if (lock.webauthn) {
      lock.webauthn = null;
      await db.setMeta('lock', lock);
      toast('生体認証をオフにしました');
    } else {
      try { await registerBio(lock); toast('生体認証を登録しました'); }
      catch (e) { toast('生体認証を登録できませんでした'); }
    }
    renderSettings();
  };
  $('#lk-off', m.el).onclick = () => {
    m.close();
    verifyPinThen(lock, async () => {
      await db.setMeta('lock', { ...lock, enabled: false, webauthn: null });
      toast('ロックをオフにしました');
      renderSettings();
    });
  };
}

function verifyPinThen(lock, onOk){
  const m = openModal(`
    <h3>現在のパスコードを入力</h3>
    <div class="field"><input type="password" id="vp" inputmode="numeric" maxlength="4" autocomplete="off"></div>
    <div class="error-msg" id="vp-err" style="display:none">パスコードが違います</div>
    <div class="btnrow">
      <button class="btn ghost" id="vp-cancel">キャンセル</button>
      <button class="btn primary" id="vp-ok">確認</button>
    </div>`);
  $('#vp-cancel', m.el).onclick = () => m.close();
  $('#vp-ok', m.el).onclick = async () => {
    if (await hashPin($('#vp', m.el).value, lock.salt) === lock.hash) { m.close(); onOk(); }
    else $('#vp-err', m.el).style.display = '';
  };
}

    ${genres.length ? `<div class="dhead">ジャンル</div>` +
      genres.map(g => `<div class="drow sub" data-go="#/genre/${g.id}"><span class="ic">${esc(g.icon)}</span>${esc(g.name)}</div>`).join('') : ''}
    <div class="dsep"></div>
    <div class="drow" data-go="#/settings"><span class="ic">⚙︎</span>設定</div>
    <div class="drow" id="dr-tut"><span class="ic">❓</span>使い方</div>
    <div class="drow" id="dr-share"><span class="ic">📤</span>アプリを共有</div>`;
  document.body.appendChild(ov);
  document.body.appendChild(dr);
  requestAnimationFrame(() => { ov.classList.add('show'); dr.classList.add('show'); });
  const close = () => {
    ov.classList.remove('show'); dr.classList.remove('show');
    setTimeout(() => { ov.remove(); dr.remove(); }, 280);
  };
  ov.onclick = close;
  $$('.drow[data-go]', dr).forEach(r => r.onclick = () => {
    close();
    const h = r.dataset.go;
    if (location.hash === h) route(); else location.hash = h;
  });
  $('#dr-add', dr).onclick = () => { close(); openGenreCreateModal(); };
  $('#dr-tut', dr).onclick = () => { close(); showTutorial(true); };
  $('#dr-share', dr).onclick = async () => {
    close();
    const url = location.protocol.startsWith('http') ? location.href.split('#')[0] : '';
    const text = 'なんでも記録ノート「MyStats」';
    if (navigator.share) {
      try { await navigator.share({ title: 'MyStats', text, url: url || undefined }); return; }
      catch (e) { if (e.name === 'AbortError') return; }
    }
    try { await navigator.clipboard.writeText(url ? text + ' ' + url : text); toast('アプリのURLをコピーしました'); }
    catch (e) { toast('共有機能を利用できませんでした'); }
  };
}

/* =====================================================
 * ⋮ドロップダウンメニュー(画像のようなコンテキストメニュー)
 * ===================================================== */
function openKebab(anchor, items){
  $$('.kmenu').forEach(k => k.remove());
  const m = document.createElement('div');
  m.className = 'kmenu';
  m.innerHTML = items.map((it, i) =>
    `<button data-i="${i}" class="${it.warn ? 'warn' : ''}"><span>${it.icon}</span>${esc(it.label)}</button>`).join('');
  anchor.appendChild(m);
  const closer = e => {
    if (!m.contains(e.target)) { m.remove(); document.removeEventListener('click', closer, true); }
  };
  setTimeout(() => document.addEventListener('click', closer, true));
  $$('button', m).forEach(b => b.onclick = () => {
    m.remove();
    document.removeEventListener('click', closer, true);
    items[+b.dataset.i].run();
  });
}

/* 各ページを初めて開いたときに1回だけツアーを表示 */
async function maybeTour(key, steps){
  if (!(await db.getMeta('tutorialDone'))) return; // 最初はスライド説明が先
  if (await db.getMeta(key)) return;
  setTimeout(() => startCoachTour(steps, key), 400);
}

function startCoachTour(steps, doneKey){
  steps = steps.filter(s => document.querySelector(s.sel));
  if (!steps.length) { if (doneKey) db.setMeta(doneKey, true); return; }
  $$('.coach').forEach(c => c.remove());
  const ov = document.createElement('div');
  ov.className = 'coach';
  ov.innerHTML = `
    <div class="coach-hole"></div>
    <div class="coach-tip"><span class="n"></span><span class="t"></span></div>
    <div class="coach-foot">
      <button id="coach-skip">スキップ</button>
      <button class="nextb" id="coach-next">つぎへ</button>
    </div>`;
  document.body.appendChild(ov);
  const hole = $('.coach-hole', ov), tip = $('.coach-tip', ov);
  let i = 0;
  function show(){
    const el = document.querySelector(steps[i].sel);
    if (!el) { next(); return; }
    el.scrollIntoView({ block: 'center' });
    const r = el.getBoundingClientRect();
    const pad = 10;
    hole.style.left = (r.left - pad) + 'px';
    hole.style.top = (r.top - pad) + 'px';
    hole.style.width = (r.width + pad * 2) + 'px';
    hole.style.height = (r.height + pad * 2) + 'px';
    hole.style.borderRadius = steps[i].round ? '999px' : '18px';
    $('.n', tip).textContent = `${i + 1} / ${steps.length}`;
    $('.t', tip).textContent = steps[i].text;
    const spaceBelow = window.innerHeight - r.bottom;
    tip.style.top = (spaceBelow > 220 ? r.bottom + pad + 24 : Math.max(16, r.top - pad - 190)) + 'px';
    $('#coach-next', ov).textContent = i === steps.length - 1 ? 'おわり' : 'つぎへ';
  }
  function finish(){ ov.remove(); if (doneKey) db.setMeta(doneKey, true); }
  function next(){ if (i < steps.length - 1) { i++; show(); } else finish(); }
  $('#coach-next', ov).onclick = next;
  $('#coach-skip', ov).onclick = finish;
  ov.addEventListener('click', e => { if (!e.target.closest('button')) next(); });
  show();
}

function showTutorial(isReplay){
  const ov = document.createElement('div');
  ov.className = 'tut-overlay';
  ov.innerHTML = `
    <div class="tut-slides" id="tut-slides">
      ${TUT_SLIDES.map(s => `<div class="tslide"><div class="art">${s.icon}</div><h2>${s.title}</h2><p>${s.body}</p></div>`).join('')}
    </div>
    <div class="tut-dots" id="tut-dots">${TUT_SLIDES.map((_, i) => `<span class="${i === 0 ? 'on' : ''}"></span>`).join('')}</div>
    <div class="tut-foot">
      <button class="btn primary" id="tut-next">つぎへ</button>
      <button id="tut-skip">スキップ</button>
    </div>`;
  document.body.appendChild(ov);
  const slides = $('#tut-slides', ov);
  const dots = $$('#tut-dots span', ov);
  let idx = 0;
  function setIdx(i){
    idx = i;
    dots.forEach((d, j) => d.classList.toggle('on', j === i));
    $('#tut-next', ov).textContent = i === TUT_SLIDES.length - 1 ? 'はじめる' : 'つぎへ';
  }
  slides.addEventListener('scroll', () => {
    const i = Math.round(slides.scrollLeft / slides.clientWidth);
    if (i !== idx && i >= 0 && i < TUT_SLIDES.length) setIdx(i);
  }, { passive: true });
  async function finish(){
    ov.remove();
    await db.setMeta('tutorialDone', true);
    // スキップでも「はじめる」でも、実画面ツアーを開始する
    if (location.hash === '#/' || location.hash === '' || location.hash === '#') {
      setTimeout(() => startCoachTour(DASH_TOUR, 'tour_dash'), 300);
    }
  }
  $('#tut-next', ov).onclick = () => {
    if (idx < TUT_SLIDES.length - 1) slides.scrollTo({ left: (idx + 1) * slides.clientWidth, behavior: 'smooth' });
    else finish();
  };
  $('#tut-skip', ov).onclick = () => finish();
}

/* =====================================================
 * 開発用ユーティリティ(コンソールから使用)
 *   mystatsDev.generateDummy(10000)  … ダミー記録を生成
 *   mystatsDev.benchmark()           … 一覧・集計の所要時間を計測
 * ===================================================== */
window.mystatsDev = {
  async generateDummy(n = 10000){
    console.time('generateDummy');
    let genres = await db.getAll('genres');
    let g = genres.find(x => x.name === 'ダミーデータ');
    if (!g) {
      const now = new Date().toISOString();
      g = {
        id: uid(), name: 'ダミーデータ', icon: '🎯', color: '#64748b',
        order: genres.length ? Math.max(...genres.map(x => x.order)) + 1 : 0,
        fields: [
          { id: uid(), name: '値', type: 'number', unit: 'pt', required: false, preset: false, order: 0 },
          { id: uid(), name: '種別', type: 'select', options: ['A', 'B', 'C', 'D'], required: false, preset: false, order: 1 },
          { id: uid(), name: '満足度', type: 'rating', required: false, preset: false, order: 2 },
        ],
        createdAt: now, updatedAt: now,
      };
      await db.put('genres', g);
    }
    const [fNum, fSel, fRate] = g.fields.map(f => f.id);
    const now = new Date().toISOString();
    const batch = [];
    for (let i = 0; i < n; i++) {
      const d = new Date();
      d.setDate(d.getDate() - Math.floor(Math.random() * 1095)); // 過去3年
      batch.push({
        id: uid(), genreId: g.id, date: fmtDate(d),
        values: {
          [fNum]: Math.round(Math.random() * 1000) / 10,
          [fSel]: ['A', 'B', 'C', 'D'][Math.floor(Math.random() * 4)],
          [fRate]: 1 + Math.floor(Math.random() * 5),
        },
        memo: '', createdAt: now, updatedAt: now,
      });
      if (batch.length >= 2000) { await db.bulkPut('records', batch.splice(0)); }
    }
    if (batch.length) await db.bulkPut('records', batch);
    console.timeEnd('generateDummy');
    console.log(`ダミー記録を${n}件生成しました(ジャンル: ダミーデータ)`);
    route();
    return g.id;
  },

  /* 一覧描画・集計が1秒以内かを計測 */
  async benchmark(genreId){
    let g = genreId ? await db.get('genres', genreId) : (await db.getAll('genres')).find(x => x.name === 'ダミーデータ');
    if (!g) { console.log('ダミーデータのジャンルがありません。先に generateDummy() を実行してください。'); return; }
    let t0 = performance.now();
    const records = await db.getRecordsByGenre(g.id);
    const tLoad = performance.now() - t0;

    t0 = performance.now();
    records.sort((a, b) => b.date < a.date ? -1 : b.date > a.date ? 1 : 0);
    const fields = (g.fields || []).slice().sort((a, b) => a.order - b.order);
    records.slice(0, 50).map(r => recordItemHTML(r, fields)).join('');
    const tList = performance.now() - t0;

    t0 = performance.now();
    const filtered = filterByPeriod(records, 'all');
    for (const f of fields) {
      if (f.type === 'number' || f.type === 'rating') aggregateNumber(filtered, f.id);
      if (f.type === 'select' || f.type === 'rating') aggregateDistribution(filtered, f);
    }
    timeSeries(filtered, fields[0]?.id, 'month');
    const tAgg = performance.now() - t0;

    const result = { 件数: records.length, 読込ms: Math.round(tLoad), 一覧ms: Math.round(tList), 集計ms: Math.round(tAgg) };
    console.table ? console.table([result]) : console.log(result);
    return result;
  },
};
