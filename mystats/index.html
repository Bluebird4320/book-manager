<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>MyStats - 汎用統計トラッカー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --primary:#6366f1;
  --primary-dark:#4f46e5;
  --bg:#f1f5f9;
  --surface:#ffffff;
  --text:#0f172a;
  --text-sub:#64748b;
  --border:#e2e8f0;
  --danger:#ef4444;
  --radius:14px;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Segoe UI",sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px}

/* ===== ヘッダー ===== */
.app-header{
  position:sticky;top:0;z-index:50;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;
}
.app-header .title{font-size:17px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{
  background:none;border:none;font-size:20px;line-height:1;padding:8px;border-radius:10px;color:var(--text);
}
.icon-btn:active{background:var(--bg)}
.header-brand{font-weight:800;font-size:18px;color:var(--primary);letter-spacing:.02em;flex:1}

/* ===== レイアウト ===== */
main{max-width:960px;margin:0 auto;padding:16px 16px 96px}
.section-title{font-size:13px;font-weight:700;color:var(--text-sub);margin:18px 2px 8px;letter-spacing:.04em}

/* ===== カード ===== */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.genre-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:640px){.genre-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:960px){.genre-grid{grid-template-columns:repeat(3,1fr)}}
.genre-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;cursor:pointer;border-top:4px solid var(--primary);transition:transform .1s}
.genre-card:active{transform:scale(.98)}
.genre-card .gc-head{display:flex;align-items:center;gap:10px}
.gc-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.gc-name{font-weight:700;font-size:16px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.streak-badge{font-size:12px;font-weight:700;color:#ea580c;background:#fff7ed;border-radius:999px;padding:2px 8px;white-space:nowrap}
.gc-stat{margin-top:10px}
.gc-stat .label{font-size:12px;color:var(--text-sub)}
.gc-stat .value{font-size:24px;font-weight:800}
.gc-stat .value small{font-size:13px;font-weight:600;color:var(--text-sub);margin-left:2px}
.gc-spark{margin-top:6px;width:100%;height:36px}
.gc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.gc-count{font-size:12px;color:var(--text-sub)}

/* ===== ボタン ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;
  background:var(--primary);color:#fff;
}
.btn:active{background:var(--primary-dark)}
.btn.secondary{background:var(--bg);color:var(--text)}
.btn.danger{background:#fef2f2;color:var(--danger)}
.btn.danger-solid{background:var(--danger);color:#fff}
.btn.small{padding:6px 12px;font-size:13px}
.btn.block{width:100%}
.btn:disabled{opacity:.4;pointer-events:none}

/* ===== FAB ===== */
.fab{
  position:fixed;right:20px;bottom:calc(20px + env(safe-area-inset-bottom));z-index:40;
  width:56px;height:56px;border-radius:50%;border:none;
  background:var(--primary);color:#fff;font-size:26px;
  box-shadow:0 4px 14px rgba(99,102,241,.4);
  display:flex;align-items:center;justify-content:center;
}
.fab:active{background:var(--primary-dark)}

/* ===== 空状態 ===== */
.empty-state{text-align:center;padding:56px 20px;color:var(--text-sub)}
.empty-state .big{font-size:48px;margin-bottom:12px}
.empty-state h2{font-size:17px;color:var(--text);margin-bottom:6px}
.empty-state p{font-size:13px;margin-bottom:20px}

/* ===== モーダル ===== */
.overlay{
  position:fixed;inset:0;z-index:100;background:rgba(15,23,42,.5);
  display:flex;align-items:flex-end;justify-content:center;
}
@media(min-width:640px){.overlay{align-items:center;padding:24px}}
.modal{
  background:var(--surface);width:100%;max-width:520px;
  border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  animation:slideup .18s ease-out;
}
@media(min-width:640px){.modal{border-radius:20px;max-height:85vh}}
@keyframes slideup{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
.modal h2{font-size:17px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.modal-foot{display:flex;gap:10px;margin-top:18px}
.modal-foot .btn{flex:1}

/* ===== フォーム ===== */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:700;margin-bottom:5px}
.form-group label .req{color:var(--danger);font-size:12px;margin-left:4px}
.form-group .hint{font-size:12px;color:var(--text-sub);margin-top:3px}
.input,.form-group input[type=text],.form-group input[type=number],.form-group input[type=date],.form-group select,.form-group textarea{
  width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;background:var(--surface);color:var(--text);
}
.form-group textarea{resize:vertical;min-height:72px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary)}
.field-error{border-color:var(--danger)!important}
.error-msg{color:var(--danger);font-size:12px;margin-top:3px}
.input-with-unit{display:flex;align-items:center;gap:8px}
.input-with-unit input{flex:1}
.input-with-unit .unit{font-size:13px;color:var(--text-sub);white-space:nowrap}

/* 評価(★) */
.rating-input{display:flex;align-items:center;gap:2px}
.rating-input .star{background:none;border:none;font-size:28px;color:#d1d5db;padding:2px}
.rating-input .star.on{color:#f59e0b}
.rating-input .clear{margin-left:8px;font-size:12px;color:var(--text-sub);background:none;border:none;text-decoration:underline}

/* チェック */
.check-input{display:flex;align-items:center;gap:8px;font-size:15px}
.check-input input{width:22px;height:22px;accent-color:var(--primary)}

/* ===== テンプレート選択 ===== */
.tpl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:480px){.tpl-grid{grid-template-columns:repeat(3,1fr)}}
.tpl-card{
  border:1.5px solid var(--border);border-radius:12px;background:var(--surface);
  padding:14px 8px;text-align:center;font-size:14px;font-weight:700;
}
.tpl-card .tpl-icon{font-size:26px;display:block;margin-bottom:4px}
.tpl-card .tpl-desc{font-size:11px;font-weight:400;color:var(--text-sub);display:block}
.tpl-card:active,.tpl-card.selected{border-color:var(--primary);background:#eef2ff}

/* 絵文字・色ピッカー */
.emoji-row{display:flex;flex-wrap:wrap;gap:6px}
.emoji-row button{width:40px;height:40px;font-size:20px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface)}
.emoji-row button.selected{border-color:var(--primary);background:#eef2ff}
.color-row{display:flex;flex-wrap:wrap;gap:8px}
.color-row button{width:32px;height:32px;border-radius:50%;border:3px solid transparent}
.color-row button.selected{border-color:var(--text)}

/* 項目プレビュー・項目エディタ */
.field-list{border:1px solid var(--border);border-radius:12px;overflow:hidden}
.field-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--surface)}
.field-row:last-child{border-bottom:none}
.field-row .f-name{font-weight:700;font-size:14px}
.field-row .f-meta{font-size:11px;color:var(--text-sub)}
.field-row .f-main{flex:1;min-width:0}
.badge{display:inline-block;font-size:10px;font-weight:700;border-radius:6px;padding:1px 6px;vertical-align:middle;margin-left:6px}
.badge.preset{background:#eef2ff;color:var(--primary)}
.badge.req{background:#fef2f2;color:var(--danger)}
.mini-btn{background:var(--bg);border:none;border-radius:8px;padding:6px 8px;font-size:13px;color:var(--text)}
.mini-btn:disabled{opacity:.3}
.mini-btn.danger{color:var(--danger)}

/* ===== ジャンル画面 ===== */
.tabs{display:flex;background:var(--surface);border-radius:12px;padding:4px;box-shadow:var(--shadow);margin-bottom:14px}
.tabs button{flex:1;border:none;background:none;padding:9px;border-radius:9px;font-size:14px;font-weight:700;color:var(--text-sub)}
.tabs button.active{background:var(--primary);color:#fff}

/* 記録一覧 */
.record-item{background:var(--surface);border-radius:12px;box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px}
.record-item .r-head{display:flex;align-items:center;gap:8px}
.record-item .r-date{font-weight:700;font-size:13px}
.record-item .r-dow{font-size:11px;color:var(--text-sub)}
.record-item .r-actions{margin-left:auto;display:flex;gap:4px}
.record-item .r-values{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:6px;font-size:13px}
.record-item .r-values .k{color:var(--text-sub);font-size:11px;margin-right:3px}
.record-item .r-memo{margin-top:6px;font-size:12px;color:var(--text-sub);white-space:pre-wrap;word-break:break-word}

/* ===== 統計 ===== */
.chip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.chip{border:1.5px solid var(--border);background:var(--surface);border-radius:999px;padding:6px 14px;font-size:13px;font-weight:700;color:var(--text-sub);white-space:nowrap}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
@media(min-width:640px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
.stat-card{background:var(--surface);border-radius:12px;box-shadow:var(--shadow);padding:12px}
.stat-card .s-label{font-size:11px;color:var(--text-sub);font-weight:700}
.stat-card .s-value{font-size:20px;font-weight:800;margin-top:2px}
.stat-card .s-value small{font-size:12px;color:var(--text-sub);font-weight:600}
.stat-card .s-sub{font-size:11px;color:var(--text-sub);margin-top:4px;line-height:1.5}
.chart-box{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.chart-box h3{font-size:13px;font-weight:700;margin-bottom:8px}
.chart-wrap{position:relative;height:240px}
.chart-wrap.donut{height:220px}

/* ===== 設定 ===== */
.settings-item{display:flex;align-items:center;gap:12px;padding:14px 2px;border-bottom:1px solid var(--border)}
.settings-item:last-child{border-bottom:none}
.settings-item .s-main{flex:1;min-width:0}
.settings-item .s-title{font-weight:700;font-size:14px}
.settings-item .s-desc{font-size:12px;color:var(--text-sub)}

/* ===== バナー・トースト ===== */
.banner{border-radius:12px;padding:12px 14px;font-size:13px;margin-bottom:12px;display:flex;gap:10px;align-items:center}
.banner.warn{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.banner.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.banner .b-main{flex:1}
#toast{
  position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));transform:translateX(-50%);
  background:var(--text);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:999px;
  opacity:0;pointer-events:none;transition:opacity .2s;z-index:200;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;
}
#toast.show{opacity:1}
.danger-zone{border:1px solid #fecaca;border-radius:12px;padding:14px;margin-top:20px}
.danger-zone h3{font-size:13px;color:var(--danger);margin-bottom:8px}

/* 全体ストリーク(ダッシュボード) */
.global-streak{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface);border-radius:999px;box-shadow:var(--shadow);
  padding:7px 16px;font-size:14px;font-weight:800;color:#ea580c;margin-bottom:14px;
}

/* ===== ダークモード(prefers-color-scheme) ===== */
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f172a;
    --surface:#1e293b;
    --text:#f1f5f9;
    --text-sub:#94a3b8;
    --border:#334155;
    --shadow:0 1px 3px rgba(0,0,0,.5),0 1px 2px rgba(0,0,0,.3);
  }
  .tpl-card:active,.tpl-card.selected,.emoji-row button.selected{background:#312e81}
  .badge.preset{background:#312e81;color:#c7d2fe}
  .badge.req{background:#7f1d1d;color:#fecaca}
  .streak-badge{background:#431407;color:#fdba74}
  .global-streak{color:#fdba74}
  .btn.secondary{background:#334155;color:var(--text)}
  .btn.danger{background:#450a0a;color:#fca5a5}
  .banner.warn{background:#422006;color:#fde68a;border-color:#92400e}
  .banner.error{background:#450a0a;color:#fecaca;border-color:#7f1d1d}
  .rating-input .star{color:#475569}
  .rating-input .star.on{color:#f59e0b}
  .danger-zone{border-color:#7f1d1d}
  #toast{background:#f1f5f9;color:#0f172a}
}
</style>

<body>
<div id="app">
  <header class="app-header" id="header"></header>
  <main id="view"></main>
</div>
<div id="toast"></div>

<script>
'use strict';
/* =====================================================
 * MyStats - 汎用統計トラッカー
 * 単一HTMLファイル / Vanilla JS / IndexedDB(mystats)
 * ===================================================== */

/* ---------- ユーティリティ ---------- */
const $ = (s, el = document) => el.querySelector(s);
const $$ = (s, el = document) => [...el.querySelectorAll(s)];
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10));
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtNum = n => (typeof n === 'number' && isFinite(n)) ? (Math.round(n * 100) / 100).toLocaleString('ja-JP') : '-';
const DOW = ['日','月','火','水','木','金','土'];
function fmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayStr(){ return fmtDate(new Date()); }
function dateLabel(s){ // "YYYY-MM-DD" -> "M/D(曜)"
  const d = new Date(s + 'T00:00:00');
  if (isNaN(d)) return s;
  return `${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]})`;
}
function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ---------- IndexedDB ラッパー ---------- */
const DB_NAME = 'mystats';
const DB_VERSION = 1;
let memoryMode = false; // IndexedDB不可時(プライベートモード等)はメモリ動作

const db = {
  _db: null,
  _mem: null, // メモリモード用: { genres:Map, records:Map, meta:Map }

  init(){
    return new Promise((resolve) => {
      if (!window.indexedDB) { this._enableMemoryMode(); resolve(); return; }
      let req;
      try { req = indexedDB.open(DB_NAME, DB_VERSION); }
      catch(e){ this._enableMemoryMode(); resolve(); return; }
      req.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('genres')) {
          const g = d.createObjectStore('genres', { keyPath: 'id' });
          g.createIndex('order', 'order');
        }
        if (!d.objectStoreNames.contains('records')) {
          const r = d.createObjectStore('records', { keyPath: 'id' });
          r.createIndex('genreId', 'genreId');
          r.createIndex('date', 'date');
          r.createIndex('genreId_date', ['genreId', 'date']);
        }
        if (!d.objectStoreNames.contains('meta')) {
          d.createObjectStore('meta', { keyPath: 'key' });
        }
      };
      req.onsuccess = (e) => { this._db = e.target.result; resolve(); };
      req.onerror = () => { this._enableMemoryMode(); resolve(); };
      req.onblocked = () => { this._enableMemoryMode(); resolve(); };
    });
  },

  _enableMemoryMode(){
    memoryMode = true;
    this._mem = { genres: new Map(), records: new Map(), meta: new Map() };
  },

  _tx(store, mode){
    return this._db.transaction(store, mode).objectStore(store);
  },
  _wrap(req){
    return new Promise((res, rej) => {
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  },
  _keyOf(store){ return store === 'meta' ? 'key' : 'id'; },

  async getAll(store){
    if (memoryMode) return [...this._mem[store].values()];
    return this._wrap(this._tx(store, 'readonly').getAll());
  },
  async get(store, key){
    if (memoryMode) return this._mem[store].get(key);
    return this._wrap(this._tx(store, 'readonly').get(key));
  },
  async put(store, obj){
    if (memoryMode) { this._mem[store].set(obj[this._keyOf(store)], obj); return obj; }
    await this._wrap(this._tx(store, 'readwrite').put(obj));
    return obj;
  },
  async bulkPut(store, objs){
    if (memoryMode) { for (const o of objs) this._mem[store].set(o[this._keyOf(store)], o); return; }
    return new Promise((res, rej) => {
      const tx = this._db.transaction(store, 'readwrite');
      const os = tx.objectStore(store);
      for (const o of objs) os.put(o);
      tx.oncomplete = () => res();
      tx.onerror = () => rej(tx.error);
    });
  },
  async delete(store, key){
    if (memoryMode) { this._mem[store].delete(key); return; }
    await this._wrap(this._tx(store, 'readwrite').delete(key));
  },
  async bulkDelete(store, keys){
    if (memoryMode) { for (const k of keys) this._mem[store].delete(k); return; }
    return new Promise((res, rej) => {
      const tx = this._db.transaction(store, 'readwrite');
      const os = tx.objectStore(store);
      for (const k of keys) os.delete(k);
      tx.oncomplete = () => res();
      tx.onerror = () => rej(tx.error);
    });
  },
  async clear(store){
    if (memoryMode) { this._mem[store].clear(); return; }
    await this._wrap(this._tx(store, 'readwrite').clear());
  },
  // 複合インデックス [genreId+date] を使った範囲取得(genreId単位)
  async getRecordsByGenre(genreId){
    if (memoryMode) return [...this._mem.records.values()].filter(r => r.genreId === genreId);
    const idx = this._tx('records', 'readonly').index('genreId_date');
    const range = IDBKeyRange.bound([genreId, ''], [genreId, '￿']);
    return this._wrap(idx.getAll(range));
  },
  async countRecordsByGenre(genreId){
    if (memoryMode) return (await this.getRecordsByGenre(genreId)).length;
    const idx = this._tx('records', 'readonly').index('genreId');
    return this._wrap(idx.count(genreId));
  },
  async getMeta(key){
    const row = await this.get('meta', key);
    return row ? row.value : undefined;
  },
  async setMeta(key, value){
    await this.put('meta', { key, value });
  }
};

/* ---------- 項目型・テンプレート定義 ---------- */
const FIELD_TYPES = {
  number: { label: '数値' },
  text:   { label: 'テキスト' },
  date:   { label: '日付' },
  select: { label: '選択式' },
  check:  { label: 'チェック' },
  rating: { label: '評価(★1〜5)' },
};

const COLORS = ['#6366f1','#0ea5e9','#10b981','#f59e0b','#ef4444','#ec4899','#8b5cf6','#64748b'];
const EMOJIS = ['📚','🏃','💰','🩺','🌲','✏️','📄','⭐','🎯','🍽️','💪','🎸','🐶','☕','🧘','🚴'];

/* 仕様書 F-2付録: ジャンルテンプレートと基本項目 */
const TEMPLATES = [
  { key:'reading', name:'読書', icon:'📚', color:'#6366f1', desc:'書名・ページ数・評価',
    fields: [
      { name:'書名', type:'text', required:true },
      { name:'ページ数', type:'number', unit:'p', required:false },
      { name:'評価', type:'rating', required:false },
      { name:'読了', type:'check', required:false },
    ]},
  { key:'exercise', name:'運動', icon:'🏃', color:'#10b981', desc:'種目・距離・時間',

/* テンプレートの fields を実体(コピー+id付与+preset:true)に変換 */
function instantiateTemplateFields(tpl){
  return tpl.fields.map((f, i) => ({
    id: uid(),
    name: f.name,
    type: f.type,
    unit: f.unit || '',
    options: f.options ? [...f.options] : undefined,
    required: !!f.required,
    preset: true,
    order: i,
  }));
}

/* ---------- モーダル ---------- */
function openModal(html){
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(ov);
  let closed = false;
  const closeFns = [];
  const onKey = e => { if (e.key === 'Escape') api.close(); };
  const api = {
    el: ov,
    close(){
      if (closed) return;
      closed = true;
      ov.remove();
      document.removeEventListener('keydown', onKey);
      closeFns.forEach(f => f());
    },
    onClose(f){ closeFns.push(f); },
  };
  document.addEventListener('keydown', onKey);
  ov.addEventListener('click', e => { if (e.target === ov) api.close(); });
  return api;
}

/* ---------- 値の表示 ---------- */
function displayValue(field, v){
  if (v === undefined || v === null || v === '') return '';
  switch (field.type) {
    case 'number': return fmtNum(Number(v)) + (field.unit ? ' ' + field.unit : '');
    case 'check':  return v ? '✓' : '';
    case 'rating': {
      const n = Math.max(0, Math.min(5, Number(v) || 0));
      return '★'.repeat(n) + '☆'.repeat(5 - n);
    }
    default: return String(v);
  }
}

/* 連続記録日数(今日または昨日を起点に遡る) */
function calcStreak(records){
  if (!records.length) return 0;
  const days = new Set(records.map(r => r.date));
  const d = new Date();
  if (!days.has(fmtDate(d))) d.setDate(d.getDate() - 1); // 今日未記録なら昨日から判定
  let streak = 0;
  while (days.has(fmtDate(d))) { streak++; d.setDate(d.getDate() - 1); }
  return streak;
}

/* 直近30日のスパークライン(SVG)。repFieldがあれば日次合計、なければ日次件数 */
function sparklineSVG(records, repField, color){
  const days = [];
  const d = new Date();
  d.setDate(d.getDate() - 29);
  const byDate = {};
  for (const r of records) {
    const v = repField ? (Number(r.values?.[repField.id]) || 0) : 1;
    byDate[r.date] = (byDate[r.date] || 0) + v;
  }
  for (let i = 0; i < 30; i++) { days.push(byDate[fmtDate(d)] || 0); d.setDate(d.getDate() + 1); }
  const max = Math.max(...days, 1);
  const W = 300, H = 36, P = 2;
  const pts = days.map((v, i) => {
    const x = P + i * (W - P * 2) / 29;
    const y = H - P - (v / max) * (H - P * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  return `<svg class="gc-spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">
    <polyline points="${pts.join(' ')}" fill="none" stroke="${esc(color)}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>
  </svg>`;
}

  { key: 'thisYear',  label: '今年' },

];
let statsPeriod = 'thisMonth';
let statsCustomFrom = '';       // 任意期間(F-4-4)
let statsCustomTo = '';
let statsChartFieldId = null;   // メイングラフの対象項目
let statsGranularity = null;    // 'day' | 'week' | 'month'(null=期間に応じて自動)
let chartInstances = [];

  for (const c of chartInstances) { try { c.destroy(); } catch(e){} }

/* その日を含む週の月曜日("YYYY-MM-DD") */
function weekStartOf(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  return fmtDate(d);
}

/* 期間 -> [開始日, 終了日](nullは無制限) */
function periodRange(period){
  const now = new Date();
  const y = now.getFullYear(), mo = now.getMonth();
  switch (period) {
    case 'thisWeek': {
      const mon = weekStartOf(todayStr());
      const sun = new Date(mon + 'T00:00:00');
      sun.setDate(sun.getDate() + 6);
      return [mon, fmtDate(sun)];
    }
    case 'thisMonth': return [fmtDate(new Date(y, mo, 1)), fmtDate(new Date(y, mo + 1, 0))];
    case 'lastMonth': return [fmtDate(new Date(y, mo - 1, 1)), fmtDate(new Date(y, mo, 0))];
    case 'thisYear':  return [`${y}-01-01`, `${y}-12-31`];
    case 'custom':    return [statsCustomFrom || null, statsCustomTo || null];
    default:          return [null, null];
  }
}

function filterByPeriod(records, period){
  const [from, to] = periodRange(period);
  if (!from && !to) return records;
  return records.filter(r => (!from || r.date >= from) && (!to || r.date <= to));
}

/* 集計エンジン: 数値項目の 合計/平均/最大/最小/件数 */
function aggregateNumber(records, fieldId){
  let sum = 0, max = -Infinity, min = Infinity, count = 0;
  for (const r of records) {
    const v = r.values?.[fieldId];
    if (v === undefined || v === null || v === '') continue;
    const n = Number(v);
    if (!isFinite(n)) continue;
    sum += n; count++;
    if (n > max) max = n;
    if (n < min) min = n;
  }
  return { sum, avg: count ? sum / count : 0, max: count ? max : 0, min: count ? min : 0, count };
}

/* select / rating の内訳 {ラベル: 件数} */
function aggregateDistribution(records, field){
  const dist = {};
  if (field.type === 'select') for (const o of field.options || []) dist[o] = 0;
  if (field.type === 'rating') for (let i = 1; i <= 5; i++) dist['★' + i] = 0;
  for (const r of records) {
    const v = r.values?.[field.id];
    if (v === undefined || v === null || v === '') continue;
    const key = field.type === 'rating' ? '★' + v : String(v);
    dist[key] = (dist[key] || 0) + 1;
  }
  return dist;
}

/* 時系列集計: granularity='day'|'week'|'month'、数値項目は期間ごとの合計、なければ件数 */
function timeSeries(records, fieldId, granularity){
  const bucket = {};
  for (const r of records) {
    const key = granularity === 'month' ? r.date.slice(0, 7)
              : granularity === 'week'  ? weekStartOf(r.date)  // 週は月曜日をキーにする
              : r.date;
    let v = 1;
    if (fieldId) {
      const raw = r.values?.[fieldId];
      if (raw === undefined || raw === null || raw === '') continue;
      v = Number(raw);
      if (!isFinite(v)) continue;
    }
    bucket[key] = (bucket[key] || 0) + v;
  }
  const keys = Object.keys(bucket).sort();
  if (!keys.length) return { labels: [], data: [] };
  // 抜けている日/週/月も0で埋めて連続にする
  const labels = [], data = [];
  if (granularity === 'day') {
    const d = new Date(keys[0] + 'T00:00:00');
    const end = keys[keys.length - 1];
    while (fmtDate(d) <= end) {
      const k = fmtDate(d);
      labels.push(k.slice(5).replace('-', '/'));
      data.push(bucket[k] || 0);
      d.setDate(d.getDate() + 1);
    }
  } else if (granularity === 'week') {
    const d = new Date(keys[0] + 'T00:00:00');
    const end = keys[keys.length - 1];
    while (fmtDate(d) <= end) {
      const k = fmtDate(d);
      labels.push(`${d.getMonth() + 1}/${d.getDate()}週`);
      data.push(bucket[k] || 0);
      d.setDate(d.getDate() + 7);
    }
  } else {
    let [y, m] = keys[0].split('-').map(Number);
    const end = keys[keys.length - 1];
    while (true) {
      const k = `${y}-${String(m).padStart(2, '0')}`;
      labels.push(`${y}/${m}`);
      data.push(bucket[k] || 0);
      if (k >= end) break;
      m++; if (m > 12) { m = 1; y++; }
    }
  }
  return { labels, data };
}

const DONUT_COLORS = ['#6366f1','#0ea5e9','#10b981','#f59e0b','#ef4444','#ec4899','#8b5cf6','#64748b','#14b8a6','#f97316'];

function renderStats(g, records){
  destroyCharts();
  const body = $('#tab-body');
  const fields = (g.fields || []).slice().sort((a, b) => a.order - b.order);
  const numberFields = fields.filter(f => f.type === 'number');
  const distFields = fields.filter(f => f.type === 'select' || f.type === 'rating');
  const checkFields = fields.filter(f => f.type === 'check');
  const filtered = filterByPeriod(records, statsPeriod);

  // メイングラフの対象項目(既定: 先頭の数値項目)
  if (statsChartFieldId && !numberFields.some(f => f.id === statsChartFieldId) && statsChartFieldId !== '__count__') statsChartFieldId = null;
  if (!statsChartFieldId) statsChartFieldId = numberFields.length ? numberFields[0].id : '__count__';

  // 粒度の自動判定(期間が短ければ日次、長ければ月次)
  let autoGran = 'month';
  if (statsPeriod === 'thisWeek' || statsPeriod === 'thisMonth' || statsPeriod === 'lastMonth') autoGran = 'day';
  else if (statsPeriod === 'custom' && statsCustomFrom && statsCustomTo) {
    const span = (new Date(statsCustomTo) - new Date(statsCustomFrom)) / 86400000;
    autoGran = span <= 45 ? 'day' : span <= 200 ? 'week' : 'month';
  }
  const gran = statsGranularity || autoGran;

  let html = `
    <div class="chip-row">
      ${PERIODS.map(p => `<button class="chip ${statsPeriod === p.key ? 'active' : ''}" data-period="${p.key}">${p.label}</button>`).join('')}
    </div>`;

  // 任意期間の日付レンジ入力
  if (statsPeriod === 'custom') {
    html += `
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
        <input type="date" id="st-from" value="${esc(statsCustomFrom)}" style="flex:1;min-width:0;border:1.5px solid var(--border);border-radius:10px;padding:8px;background:var(--surface);color:var(--text)">
        <span style="color:var(--text-sub)">〜</span>
        <input type="date" id="st-to" value="${esc(statsCustomTo)}" style="flex:1;min-width:0;border:1.5px solid var(--border);border-radius:10px;padding:8px;background:var(--surface);color:var(--text)">
        <button class="btn small" id="st-apply">適用</button>
      </div>`;
  }

  if (!filtered.length) {
    html += `<div class="empty-state"><div class="big">📈</div><h2>この期間の記録はありません</h2><p>期間を変えるか、記録を追加してください</p></div>`;
    body.innerHTML = html;
    wirePeriodChips(g, records);
    wireCustomRange(g, records);
    return;
  }

  // サマリーカード
  html += `<div class="stat-grid">
    <div class="stat-card"><div class="s-label">記録件数</div><div class="s-value">${fmtNum(filtered.length)}<small> 件</small></div></div>`;
  for (const f of numberFields) {
    const a = aggregateNumber(filtered, f.id);
    const u = f.unit ? ' ' + esc(f.unit) : '';
    html += `
      <div class="stat-card">
        <div class="s-label">${esc(f.name)}(合計)</div>
        <div class="s-value">${fmtNum(a.sum)}<small>${u}</small></div>
        <div class="s-sub">平均 ${fmtNum(a.avg)}${u} / 最大 ${fmtNum(a.max)}${u}<br>最小 ${fmtNum(a.min)}${u} / ${fmtNum(a.count)}件</div>
      </div>`;
  }
  for (const f of distFields.filter(x => x.type === 'rating')) {
    const a = aggregateNumber(filtered, f.id);
    html += `
      <div class="stat-card">
        <div class="s-label">${esc(f.name)}(平均)</div>
        <div class="s-value">${a.count ? fmtNum(a.avg) : '-'}<small> / 5</small></div>
        <div class="s-sub">${fmtNum(a.count)}件</div>
      </div>`;
  }
  for (const f of checkFields) {
    const yes = filtered.filter(r => r.values?.[f.id] === true).length;
    html += `
      <div class="stat-card">
        <div class="s-label">${esc(f.name)}</div>
        <div class="s-value">${fmtNum(yes)}<small> 回</small></div>
        <div class="s-sub">記録中 ${filtered.length ? Math.round(yes / filtered.length * 100) : 0}%</div>
      </div>`;
  }
  html += `</div>`;

  // メイングラフ(時系列: 日次=折れ線、週次・月次=棒)
  const chartAvailable = typeof Chart !== 'undefined';
  const granLabel = gran === 'day' ? '日次' : gran === 'week' ? '週次' : '月次';
  html += `
    <div class="chart-box">
      <h3>📈 推移(${granLabel})</h3>
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <select id="st-field" class="input" style="flex:1;min-width:120px;padding:6px 10px;font-size:13px">
          ${numberFields.map(f => `<option value="${f.id}" ${statsChartFieldId === f.id ? 'selected' : ''}>${esc(f.name)}(合計)</option>`).join('')}
          <option value="__count__" ${statsChartFieldId === '__count__' ? 'selected' : ''}>記録件数</option>
        </select>
        <div class="tabs" style="margin:0;padding:3px;box-shadow:none;border:1px solid var(--border)">
          <button id="st-day" class="${gran === 'day' ? 'active' : ''}" style="padding:5px 12px;font-size:12px">日</button>
          <button id="st-week" class="${gran === 'week' ? 'active' : ''}" style="padding:5px 12px;font-size:12px">週</button>
          <button id="st-month" class="${gran === 'month' ? 'active' : ''}" style="padding:5px 12px;font-size:12px">月</button>
        </div>
      </div>
      ${chartAvailable ? '<div class="chart-wrap"><canvas id="st-main-chart"></canvas></div>'
        : '<p style="font-size:13px;color:var(--text-sub)">グラフ描画ライブラリ(Chart.js)を読み込めませんでした。オンライン環境で再読み込みしてください。</p>'}
    </div>`;

  // 内訳ドーナツ(select / rating)
  if (chartAvailable) {
    for (const f of distFields) {
      html += `
        <div class="chart-box">
          <h3>🍩 ${esc(f.name)}の内訳</h3>
          <div class="chart-wrap donut"><canvas data-donut="${f.id}"></canvas></div>
        </div>`;
    }
  }

  body.innerHTML = html;
  wirePeriodChips(g, records);
  wireCustomRange(g, records);

  $('#st-field').onchange = e => { statsChartFieldId = e.target.value; renderStats(g, records); };
  $('#st-day').onclick = () => { statsGranularity = 'day'; renderStats(g, records); };
  $('#st-week').onclick = () => { statsGranularity = 'week'; renderStats(g, records); };
  $('#st-month').onclick = () => { statsGranularity = 'month'; renderStats(g, records); };

  if (!chartAvailable) return;

  // ダークモードに応じたChart.js既定色
  const darkMode = window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches;
  Chart.defaults.color = darkMode ? '#94a3b8' : '#64748b';
  Chart.defaults.borderColor = darkMode ? 'rgba(148,163,184,.18)' : 'rgba(100,116,139,.15)';

  // メイングラフ描画(日次=折れ線 / 週次・月次=棒)
  const fieldId = statsChartFieldId === '__count__' ? null : statsChartFieldId;
  const ts = timeSeries(filtered, fieldId, gran);
  const fieldDef = fieldId ? numberFields.find(f => f.id === fieldId) : null;
  const label = fieldDef ? `${fieldDef.name}${fieldDef.unit ? '(' + fieldDef.unit + ')' : ''}` : '記録件数';
  chartInstances.push(new Chart($('#st-main-chart'), {
    type: gran === 'day' ? 'line' : 'bar',
    data: {
      labels: ts.labels,
      datasets: [{
        label,
        data: ts.data,
        borderColor: g.color,
        backgroundColor: gran === 'day' ? g.color + '33' : g.color + 'cc',
        fill: gran === 'day',
        tension: 0.3,
        pointRadius: ts.labels.length > 62 ? 0 : 3,
        borderWidth: 2,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { font: { size: 11 } } },
        x: { ticks: { font: { size: 10 }, maxTicksLimit: 12, maxRotation: 0 } },
      },
    },
  }));

  // ドーナツ描画
  for (const f of distFields) {
    const dist = aggregateDistribution(filtered, f);
    const entries = Object.entries(dist).filter(([, n]) => n > 0);
    const canvas = $(`canvas[data-donut="${f.id}"]`);
    if (!entries.length) {
      canvas.closest('.chart-wrap').innerHTML = '<p style="font-size:13px;color:var(--text-sub);text-align:center;padding-top:80px">データがありません</p>';
      continue;
    }
    chartInstances.push(new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels: entries.map(([k]) => k),
        datasets: [{ data: entries.map(([, n]) => n), backgroundColor: DONUT_COLORS.slice(0, entries.length), borderWidth: 2, borderColor: darkMode ? '#1e293b' : '#fff' }],
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '60%',
        plugins: { legend: { position: 'right', labels: { font: { size: 12 }, boxWidth: 14 } } },
      },
    }));
  }
}

function wirePeriodChips(g, records){
  $$('.chip[data-period]').forEach(c => c.onclick = () => {
    statsPeriod = c.dataset.period;
    statsGranularity = null; // 期間変更時は自動粒度に戻す
    if (statsPeriod === 'custom' && !statsCustomFrom) {
      // 初回は今月をデフォルトにする
      statsCustomFrom = todayStr().slice(0, 7) + '-01';
      statsCustomTo = todayStr();
    }
    renderStats(g, records);
  });
}

function wireCustomRange(g, records){
  const apply = $('#st-apply');
  if (!apply) return;
  apply.onclick = () => {
    statsCustomFrom = $('#st-from').value;
    statsCustomTo = $('#st-to').value;
    statsGranularity = null;
    renderStats(g, records);
  };
}

/* =====================================================
 * 記録入力モーダル(S-3)
 * ===================================================== */
function fieldInputHTML(f, value){
  const v = value === undefined || value === null ? '' : value;
  switch (f.type) {
    case 'number':
      return `<div class="input-with-unit"><input type="number" step="any" inputmode="decimal" data-fid="${f.id}" value="${esc(v)}">${f.unit ? `<span class="unit">${esc(f.unit)}</span>` : ''}</div>`;
    case 'text':
      return `<input type="text" data-fid="${f.id}" value="${esc(v)}">`;
    case 'date':
      return `<input type="date" data-fid="${f.id}" value="${esc(v)}">`;
    case 'select':
      return `<select data-fid="${f.id}">
        <option value="">選択してください</option>
        ${(f.options || []).map(o => `<option value="${esc(o)}" ${String(v) === o ? 'selected' : ''}>${esc(o)}</option>`).join('')}
      </select>`;
    case 'check':
      return `<label class="check-input"><input type="checkbox" data-fid="${f.id}" ${v === true ? 'checked' : ''}><span>はい</span></label>`;
    case 'rating': {
      const n = Number(v) || 0;
      return `<div class="rating-input" data-fid="${f.id}" data-value="${n}">
        ${[1,2,3,4,5].map(i => `<button type="button" class="star ${i <= n ? 'on' : ''}" data-star="${i}">★</button>`).join('')}
        <button type="button" class="clear">クリア</button>
      </div>`;
    }
  }
  return '';
}

function readFieldValue(f, container){
  switch (f.type) {
    case 'number': {
      const raw = $(`input[data-fid="${f.id}"]`, container).value.trim();
      if (raw === '') return undefined;
      const n = Number(raw);
      return isFinite(n) ? n : undefined;
    }
    case 'text': {
      const raw = $(`input[data-fid="${f.id}"]`, container).value.trim();
      return raw === '' ? undefined : raw;
    }
    case 'date': {
      const raw = $(`input[data-fid="${f.id}"]`, container).value;
      return raw === '' ? undefined : raw;
    }
    case 'select': {
      const raw = $(`select[data-fid="${f.id}"]`, container).value;
      return raw === '' ? undefined : raw;
    }
    case 'check':
      return $(`input[data-fid="${f.id}"]`, container).checked;
    case 'rating': {
      const n = Number($(`.rating-input[data-fid="${f.id}"]`, container).dataset.value) || 0;
      return n === 0 ? undefined : n;
    }
  }
  return undefined;
}

function openRecordModal(genre, record = null){
  const fields = (genre.fields || []).slice().sort((a, b) => a.order - b.order);
  const isEdit = !!record;
  const m = openModal(`
    <h2>${esc(genre.icon)} ${isEdit ? '記録を編集' : '記録をつける'}</h2>
    <div class="form-group">
      <label>日付<span class="req">必須</span></label>
      <input type="date" id="rec-date" value="${esc(record ? record.date : todayStr())}">
    </div>
    ${fields.map(f => `
      <div class="form-group" data-group="${f.id}">
        <label>${esc(f.name)}${f.required ? '<span class="req">必須</span>' : ''}</label>
        ${fieldInputHTML(f, record ? record.values?.[f.id] : undefined)}
        <div class="error-msg" style="display:none">入力してください</div>
      </div>`).join('')}
    <div class="form-group">
      <label>メモ</label>
      <textarea id="rec-memo" placeholder="自由メモ(任意)">${esc(record ? record.memo || '' : '')}</textarea>
    </div>
    <div class="modal-foot">
      <button class="btn secondary" id="rec-cancel">キャンセル</button>
      <button class="btn" id="rec-save">${isEdit ? '更新する' : '保存する'}</button>
    </div>`);

  // 評価(★)ウィジェット
  $$('.rating-input', m.el).forEach(w => {
    w.addEventListener('click', e => {
      const star = e.target.closest('[data-star]');
      if (star) {
        w.dataset.value = star.dataset.star;
      } else if (e.target.closest('.clear')) {
        w.dataset.value = 0;
      } else return;
      const n = Number(w.dataset.value);
      $$('.star', w).forEach((s, i) => s.classList.toggle('on', i < n));
    });
  });

  $('#rec-cancel', m.el).onclick = () => m.close();
  $('#rec-save', m.el).onclick = async () => {
    const date = $('#rec-date', m.el).value;
    if (!date) { $('#rec-date', m.el).classList.add('field-error'); return; }

    // 必須検証
    let ok = true;
    const values = {};
    for (const f of fields) {
      const v = readFieldValue(f, m.el);
      const group = $(`[data-group="${f.id}"]`, m.el);
      const missing = f.required && f.type !== 'check' && (v === undefined);
      $('.error-msg', group).style.display = missing ? '' : 'none';
      if (missing) { ok = false; continue; }
      if (v !== undefined) values[f.id] = v;
    }
    if (!ok) return;

    // 定義に存在しない旧項目の値は残置(削除しない)
    if (isEdit && record.values) {
      const known = new Set(fields.map(f => f.id));
      for (const [k, v] of Object.entries(record.values)) {
        if (!known.has(k) && !(k in values)) values[k] = v;
      }
    }

    const now = new Date().toISOString();
    const rec = isEdit
      ? { ...record, date, values, memo: $('#rec-memo', m.el).value.trim(), updatedAt: now }
      : { id: uid(), genreId: genre.id, date, values, memo: $('#rec-memo', m.el).value.trim(), createdAt: now, updatedAt: now };
    await db.put('records', rec);
    await db.setMeta('lastGenreId', genre.id); // FABのジャンル選択で前回選択を記憶
    m.close();
    toast(isEdit ? '記録を更新しました' : '記録を保存しました');
    route();
  };
}

    if (!name) { $('#ge-name').classList.add('field-error'); $('#ge-name').focus(); return; }
    const fresh = await db.get('genres', id);
    fresh.name = name; fresh.icon = icon; fresh.color = color;
    fresh.updatedAt = new Date().toISOString();
    await db.put('genres', fresh);
    toast('保存しました');
    location.hash = `#/genre/${id}`;
  };

  // 項目の追加・編集・削除・並べ替え(即時保存)
  $('#ge-add-field').onclick = () => openFieldEditModal(g, null);
  const list = $('#ge-fields');
  if (list) list.addEventListener('click', async e => {
    const row = e.target.closest('.field-row');
    if (!row) return;
    const fid = row.dataset.fid;
    const fresh = await db.get('genres', id);
    const fs = fresh.fields.slice().sort((a, b) => a.order - b.order);
    const idx = fs.findIndex(f => f.id === fid);
    if (idx < 0) return;

    if (e.target.closest('[data-up]') || e.target.closest('[data-down]')) {
      const j = e.target.closest('[data-up]') ? idx - 1 : idx + 1;
      if (j < 0 || j >= fs.length) return;
      [fs[idx], fs[j]] = [fs[j], fs[idx]];
      fs.forEach((f, i) => f.order = i);
      fresh.fields = fs;
      fresh.updatedAt = new Date().toISOString();
      await db.put('genres', fresh);
      renderGenreEdit(id);
      return;
    }
    if (e.target.closest('[data-fedit]')) { openFieldEditModal(g, fs[idx]); return; }
    if (e.target.closest('[data-fdel]')) { await deleteFieldFlow(fresh, fs[idx]); return; }
  });

  // ジャンル削除(件数表示 + ジャンル名の入力一致で解錠)
  $('#ge-delete').onclick = () => openGenreDeleteModal(g, recordCount);
}

/* 項目に値が入っている記録の件数 */
async function countRecordsWithField(genreId, fieldId){
  const records = await db.getRecordsByGenre(genreId);
  return records.filter(r => {
    const v = r.values?.[fieldId];
    return v !== undefined && v !== null && v !== '';
  }).length;
}

/* 項目削除フロー: 「N件の記録に値があります」表示 + confirm */
async function deleteFieldFlow(genre, field){
  const n = await countRecordsWithField(genre.id, field.id);
  const msg = n > 0
    ? `項目「${field.name}」を削除しますか?\n\n${n}件の記録にこの項目の値があります。\n(値はデータ上残りますが、表示・集計されなくなります)`
    : `項目「${field.name}」を削除しますか?`;
  if (!confirm(msg)) return;
  genre.fields = genre.fields.filter(f => f.id !== field.id);
  genre.fields.slice().sort((a, b) => a.order - b.order).forEach((f, i) => f.order = i);
  genre.updatedAt = new Date().toISOString();
  await db.put('genres', genre); // records側の値は残置(表示時に定義側でフィルタ)
  toast(`項目「${field.name}」を削除しました`);
  renderGenreEdit(genre.id);
}

  const m = openModal(`

      </select>
      <div class="hint" id="fe-type-hint" style="display:none"></div>
    </div>
    <div class="form-group" id="fe-unit-group" style="display:${f.type === 'number' ? '' : 'none'}">

      <textarea id="fe-options" placeholder="例:&#10;ランニング&#10;筋トレ">${esc((f.options || []).join('\n'))}</textarea>
    </div>
    <div class="form-group">
      <label class="check-input"><input type="checkbox" id="fe-required" ${f.required ? 'checked' : ''}><span>必須項目にする</span></label>
    </div>
    <div class="modal-foot">
      <button class="btn secondary" id="fe-cancel">キャンセル</button>
      <button class="btn" id="fe-save">${isEdit ? '更新する' : '追加する'}</button>
    </div>`);

  $('#fe-type', m.el).onchange = () => {

  };

    const type = $('#fe-type', m.el).value;
    const unit = $('#fe-unit', m.el).value.trim();
    const options = $('#fe-options', m.el).value.split('\n').map(s => s.trim()).filter(Boolean);

    if (type === 'select' && options.length === 0) { $('#fe-options', m.el).classList.add('field-error'); return; }

    const fresh = await db.get('genres', genre.id);

    // 記録が1件以上ある項目の型変更は、影響件数を示して確認
    if (isEdit && type !== field.type) {

  };

/* =====================================================
 * データ管理(エクスポート/インポート/全削除)
 * ===================================================== */
function downloadFile(filename, content, mime){
  const blob = new Blob([content], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
}

async function exportJSON(){
  const [genres, records] = await Promise.all([db.getAll('genres'), db.getAll('records')]);
  const payload = {
    app: 'mystats',
    version: 1,
    exportedAt: new Date().toISOString(),
    genres, records,
  };
  downloadFile(`mystats_backup_${todayStr().replace(/-/g, '')}.json`, JSON.stringify(payload, null, 2), 'application/json');
  await db.setMeta('lastExportAt', payload.exportedAt);
  toast('JSONをエクスポートしました');
}

/* インポート: スキーマ検証 */
function validateImport(obj){
  const errors = [];
  if (!obj || typeof obj !== 'object') return ['JSONの形式が不正です'];
  if (obj.app !== 'mystats') errors.push('MyStatsのバックアップファイルではありません(appキー不一致)');
  if (obj.version !== 1) errors.push(`対応していないバージョンです(version: ${obj.version ?? 'なし'})`);
  if (!Array.isArray(obj.genres)) errors.push('genres が配列ではありません');
  if (!Array.isArray(obj.records)) errors.push('records が配列ではありません');
  if (errors.length) return errors;
  for (const g of obj.genres) {
    if (!g.id || typeof g.name !== 'string' || !Array.isArray(g.fields)) { errors.push('ジャンルデータの形式が不正です'); break; }
  }
  for (const r of obj.records) {
    if (!r.id || !r.genreId || typeof r.date !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(r.date)) { errors.push('記録データの形式が不正です(id/genreId/date)'); break; }
  }
  return errors;
}

async function importJSON(file){
  let obj;
  try { obj = JSON.parse(await file.text()); }
  catch(e){ alert('JSONの解析に失敗しました: ' + e.message); return; }
  const errors = validateImport(obj);
  if (errors.length) { alert('インポートできません:\n・' + errors.join('\n・')); return; }

  const [curGenres, curRecords] = await Promise.all([db.getAll('genres'), db.getAll('records')]);
  const genreIds = new Set(curGenres.map(g => g.id));
  const recordIds = new Set(curRecords.map(r => r.id));
  const dupGenres = obj.genres.filter(g => genreIds.has(g.id));
  const dupRecords = obj.records.filter(r => recordIds.has(r.id));

  let mode = 'add';
  if (dupGenres.length || dupRecords.length) {
    mode = await askImportMode(dupGenres.length, dupRecords.length);
    if (!mode) return; // キャンセル
  }

  let genres = obj.genres.map(g => ({ ...g }));
  let records = obj.records.map(r => ({ ...r }));

  if (mode === 'newid') {
    // 重複IDのジャンルには新IDを割り当て、配下recordsのgenreIdも付け替える
    const genreMap = {};
    for (const g of genres) {
      if (genreIds.has(g.id)) { const nid = uid(); genreMap[g.id] = nid; g.id = nid; }
    }
    for (const r of records) {
      if (genreMap[r.genreId]) r.genreId = genreMap[r.genreId];
      if (recordIds.has(r.id)) r.id = uid();
    }
  }
  // mode === 'replace' は同一IDをそのまま put(上書き)

  // 新規追加になるジャンルは既存の後ろに並べる(置換はインポート元のorderを維持)
  let nextOrder = curGenres.length ? Math.max(...curGenres.map(g => g.order)) + 1 : 0;
  for (const g of genres) {
    if (!genreIds.has(g.id)) g.order = nextOrder++;
  }

  await db.bulkPut('genres', genres);
  await db.bulkPut('records', records);
  toast(`インポート完了(ジャンル${genres.length}件・記録${fmtNum(records.length)}件)`);
  route();
}

/* 重複ID時の取込方法を選択(置換 / 新IDで取込 / キャンセル) */
function askImportMode(nGenres, nRecords){
  return new Promise(resolve => {
    const m = openModal(`
      <h2>⚠️ IDが重複しています</h2>
      <p style="font-size:13px;margin-bottom:14px">
        既存データとIDが重複しています(ジャンル${nGenres}件・記録${fmtNum(nRecords)}件)。<br>取込方法を選んでください。
      </p>
      <button class="btn block" id="im-replace" style="margin-bottom:8px">置換(既存の同IDデータを上書き)</button>
      <button class="btn secondary block" id="im-newid" style="margin-bottom:8px">新IDで取込(既存を残して複製)</button>
      <button class="btn secondary block" id="im-cancel">キャンセル</button>`);
    let done = false;
    const finish = v => { if (!done) { done = true; m.close(); resolve(v); } };
    $('#im-replace', m.el).onclick = () => finish('replace');
    $('#im-newid', m.el).onclick = () => finish('newid');
    $('#im-cancel', m.el).onclick = () => finish(null);
    m.onClose(() => finish(null)); // 背景タップ・Escで閉じた場合はキャンセル扱い
  });
}

/* ジャンル別CSVエクスポート */
function csvEscape(v){
  const s = String(v ?? '');
  return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

async function exportCSV(genreId){
  const g = await db.get('genres', genreId);
  if (!g) return;
  const fields = (g.fields || []).slice().sort((a, b) => a.order - b.order);
  const records = (await db.getRecordsByGenre(genreId)).sort((a, b) => a.date < b.date ? 1 : -1);
  const header = ['日付', ...fields.map(f => f.name + (f.unit ? `(${f.unit})` : '')), 'メモ'];
  const lines = [header.map(csvEscape).join(',')];
  for (const r of records) {
    const row = [r.date];
    for (const f of fields) {
      const v = r.values?.[f.id];
      row.push(f.type === 'check' ? (v === true ? '1' : '') : (v ?? ''));
    }
    row.push(r.memo || '');
    lines.push(row.map(csvEscape).join(','));
  }
  // BOM付きUTF-8(Excel対応)
  downloadFile(`mystats-${g.name}-${todayStr()}.csv`, '\uFEFF' + lines.join('\r\n'), 'text/csv');
  toast(`「${g.name}」のCSVをエクスポートしました`);
}

          { id: uid(), name: '種別', type: 'select', options: ['A', 'B', 'C', 'D'], required: false, preset: false, order: 1 },
          { id: uid(), name: '満足度', type: 'rating', required: false, preset: false, order: 2 },
        ],
        createdAt: now, updatedAt: now,
      };
      await db.put('genres', g);
    }
    const [fNum, fSel, fRate] = g.fields.map(f => f.id);
    const now = new Date().toISOString();
    const batch = [];
    for (let i = 0; i < n; i++) {
      const d = new Date();
      d.setDate(d.getDate() - Math.floor(Math.random() * 1095)); // 過去3年
      batch.push({
        id: uid(), genreId: g.id, date: fmtDate(d),
        values: {
          [fNum]: Math.round(Math.random() * 1000) / 10,
          [fSel]: ['A', 'B', 'C', 'D'][Math.floor(Math.random() * 4)],
          [fRate]: 1 + Math.floor(Math.random() * 5),
        },
        memo: '', createdAt: now, updatedAt: now,
      });
      if (batch.length >= 2000) { await db.bulkPut('records', batch.splice(0)); }
    }
    if (batch.length) await db.bulkPut('records', batch);
    console.timeEnd('generateDummy');
    console.log(`ダミー記録を${n}件生成しました(ジャンル: ダミーデータ)`);
    route();
    return g.id;
  },

  /* 一覧描画・集計が1秒以内かを計測 */
  async benchmark(genreId){
    let g = genreId ? await db.get('genres', genreId) : (await db.getAll('genres')).find(x => x.name === 'ダミーデータ');
    if (!g) { console.log('ダミーデータのジャンルがありません。先に generateDummy() を実行してください。'); return; }
    let t0 = performance.now();
    const records = await db.getRecordsByGenre(g.id);
    const tLoad = performance.now() - t0;

    t0 = performance.now();
    records.sort((a, b) => b.date < a.date ? -1 : b.date > a.date ? 1 : 0);
    const fields = (g.fields || []).slice().sort((a, b) => a.order - b.order);
    records.slice(0, 50).map(r => recordItemHTML(r, fields)).join('');
    const tList = performance.now() - t0;

    t0 = performance.now();
    const filtered = filterByPeriod(records, 'all');
    for (const f of fields) {
      if (f.type === 'number' || f.type === 'rating') aggregateNumber(filtered, f.id);
      if (f.type === 'select' || f.type === 'rating') aggregateDistribution(filtered, f);
    }
    timeSeries(filtered, fields[0]?.id, 'month');
    const tAgg = performance.now() - t0;

    const result = { 件数: records.length, 読込ms: Math.round(tLoad), 一覧ms: Math.round(tList), 集計ms: Math.round(tAgg) };
    console.table ? console.table([result]) : console.log(result);
    return result;
  },
};

/* ---------- 起動 ---------- */
(async function init(){
  await db.init();
  window.addEventListener('hashchange', route);
  await route();
})();
</script>
